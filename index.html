<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axeron | TikTok Treasure Sniper v3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0050;
            --neon-blue: #00f2ff;
            --gold: #facd05;
            --dark-bg: #050505;
            --card-bg: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        
        body {
            background-color: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(255, 0, 80, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 0, 80, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-bottom: 2px solid var(--neon-pink);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--neon-pink); letter-spacing: 3px; }
        .stats-top { display: flex; gap: 20px; font-size: 14px; }
        .status-live { color: #00ff41; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0; } }

        /* --- MAIN LAYOUT --- */
        .container { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 80px); }

        /* --- SIDEBAR CONTROLS --- */
        .sidebar {
            background: var(--card-bg);
            padding: 20px;
            border-right: 1px solid #222;
        }

        .control-group { margin-bottom: 30px; }
        label { display: block; margin-bottom: 10px; color: var(--neon-blue); font-size: 12px; }
        select, input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }

        .btn-scan {
            background: var(--neon-pink);
            color: #fff;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-pink);
            transition: 0.3s;
        }

        .btn-scan:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--neon-pink); }

        /* --- TREASURE GRID --- */
        .content { padding: 30px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .chest-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            position: relative;
            transition: 0.4s;
            overflow: hidden;
        }

        .chest-card:hover {
            border-color: var(--gold);
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(250, 205, 5, 0.2);
        }

        .chest-card::before {
            content: "VIP";
            position: absolute;
            top: -10px; right: -10px;
            background: var(--gold);
            color: #000;
            padding: 15px;
            transform: rotate(45deg);
            font-size: 10px;
            font-weight: bold;
        }

        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--neon-pink); }

        .coin-info {
            font-size: 32px;
            color: var(--gold);
            font-weight: bold;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timer { font-size: 14px; color: #888; margin-bottom: 20px; }
        .timer span { color: var(--neon-blue); }

        .btn-go {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: 0.3s;
        }

        .btn-go:hover { background: var(--neon-blue); color: #000; }

        /* --- NOTIFICATION LOG --- */
        .log-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            padding: 10px;
            font-size: 11px;
            color: #00ff41;
            border-radius: 5px;
        }

    </style>
</head>
<body>

<nav>
    <div class="logo">AXERON SNIPER</div>
    <div class="stats-top">
        <span>Skaner: <b class="status-live">ONLINE</b></span>
        <span>Tapılan Xəzinə: <b id="totalCount">1,402</b></span>
        <span>Aktiv Botlar: <b>42</b></span>
    </div>
</nav>

<div class="container">
    <div class="sidebar">
        <div class="control-group">
            <label>MİNİMUM JETON SƏVİYYƏSİ</label>
            <select id="minCoins">
                <option value="50">50+ Jeton</option>
                <option value="100">100+ Jeton</option>
                <option value="500">500+ Jeton</option>
            </select>
        </div>

        <div class="control-group">
            <label>ÖLKƏ FİLTRİ</label>
            <select>
                <option>Global (Hamısı)</option>
                <option>Azərbaycan</option>
                <option>Türkiyə</option>
                <option>Rusiya</option>
            </select>
        </div>

        <div class="control-group">
            <label>AVTOMATİK YENİLƏMƏ (ms)</label>
            <input type="number" value="5000">
        </div>

        <button class="btn-scan" onclick="startManualScan()">SKANERİ BAŞLAT</button>
    </div>

    <div class="content">
        <div class="grid" id="treasureGrid">
            </div>
    </div>
</div>

<div class="log-box" id="logBox">
    [10:20:01] Skaner başladıldı...<br>
    [10:20:05] TikTok API bağlantısı quruldu.<br>
</div>

<script>
    const users = ["Hacker_Baku", "Pro_Gamer", "King_Chest", "TikTok_Ovçusu", "Zirve_Canli", "Ali_Live"];
    const grid = document.getElementById('treasureGrid');
    const log = document.getElementById('logBox');

    function createCard() {
        const user = users[Math.floor(Math.random() * users.length)];
        const coins = Math.floor(Math.random() * 950) + 50;
        const time = Math.floor(Math.random() * 4) + 1;

        const card = document.createElement('div');
        card.className = 'chest-card';
        card.innerHTML = `
            <div class="user-info">
                <img src="https://i.pravatar.cc/150?u=${user}" class="avatar">
                <div>
                    <div style="font-weight:bold;">@${user}</div>
                    <div style="font-size:10px; color:#666;">Canlı Yayım Skan Edildi</div>
                </div>
            </div>
            <div class="coin-info">
                <i class="fas fa-coins"></i> ${coins}
            </div>
            <div class="timer">Açılmağa qaldı: <span>${time}:44 san</span></div>
            <a href="#" class="btn-go" onclick="alert('Yayima Yönləndirilir...')">YAYIMA DAXİL OL</a>
        `;
        
        if(grid.children.length > 8) grid.removeChild(grid.lastChild);
        grid.prepend(card);
        
        log.innerHTML += `[${new Date().toLocaleTimeString()}] Tapıldı: @${user} - ${coins} Jeton<br>`;
        log.scrollTop = log.scrollHeight;
    }

    // İlk kartları yarat
    for(let i=0; i<6; i++) { setTimeout(createCard, i * 500); }

    // Hər 5 saniyədən bir yeni xəzinə tap
    setInterval(createCard, 5000);

    function startManualScan() {
        alert("Global Skaner Aktiv Edildi! Bütün ölkələr üzrə axtarış gedir...");
    }
</script>

</body>
</html>
