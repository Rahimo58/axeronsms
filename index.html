<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axeron Elan | Premium Dark Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #00f2ff; /* Neon Mavi */
            --accent: #7000ff; /* Neon Bənövşəyi */
            --bg: #0a0b10;
            --card: #161b22;
            --text: #ffffff;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-top: 70px; overflow-x: hidden; }

        /* HEADER */
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: 70px; 
            background: rgba(10, 11, 16, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 20px; z-index: 1000;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }
        .menu-icon { font-size: 24px; cursor: pointer; color: var(--primary); transition: 0.3s; }
        .menu-icon:hover { text-shadow: 0 0 10px var(--primary); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; flex: 1; text-align: center; letter-spacing: 3px; color: var(--primary); }

        /* SIDEBAR (ÖZEL MENYU) */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 300px; height: 100%;
            background: var(--card); z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--primary); padding: 40px 25px;
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .side-item { 
            padding: 18px 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 20px; color: #ccc; 
            text-decoration: none; cursor: pointer; transition: 0.3s;
            border: 1px solid transparent;
        }
        .side-item:hover { background: rgba(0, 242, 255, 0.05); border-color: var(--primary); color: var(--primary); }
        .side-item i { font-size: 20px; }

        /* HERO BANNER */
        .hero-banner { 
            background: linear-gradient(45deg, var(--accent), var(--primary)); 
            padding: 25px; border-radius: 20px; margin: 10px 15px 25px; 
            text-align: center; box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .hero-banner h2 { font-family: 'Orbitron', sans-serif; font-size: 20px; color: #fff; margin-bottom: 5px; }

        /* ELAN GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .ad-card { 
            background: var(--card); border-radius: 18px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            position: relative;
        }
        .ad-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .ad-card img { width: 100%; height: 160px; object-fit: cover; }
        .ad-body { padding: 12px; }
        .ad-price { font-size: 18px; font-weight: 700; color: var(--primary); text-shadow: 0 0 5px rgba(0, 242, 255, 0.5); }
        .ad-title { font-size: 14px; color: #eee; margin: 4px 0 8px; height: 36px; overflow: hidden; }
        .ad-loc { font-size: 11px; color: #888; display: flex; align-items: center; gap: 5px; }

        /* FLOATING ACTION BUTTON */
        .fab {
            position: fixed; bottom: 25px; right: 20px; 
            background: linear-gradient(45deg, #00f2ff, #7000ff);
            padding: 15px 25px; border-radius: 50px; color: #fff;
            text-decoration: none; font-weight: 700; z-index: 900;
            box-shadow: 0 5px 20px rgba(112, 0, 255, 0.4);
            display: flex; align-items: center; gap: 10px;
        }

        /* ADMIN PANEL STYLES */
        .full-page { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; flex-direction: column; overflow-y: auto; }
        .p-header { background: var(--card); padding: 20px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--primary); }
        .p-body { padding: 20px; }
        input, select, textarea { 
            width: 100%; padding: 15px; background: #1a1f26; border: 1px solid #333; 
            border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--primary); }
        .btn { 
            background: var(--primary); color: #000; padding: 18px; border-radius: 12px; 
            border: none; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase;
        }

        /* CUSTOM MODAL OVERLAY */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="menu-icon" onclick="toggleSidebar()"><i class="fas fa-th-large"></i></div>
        <div class="logo">AXERON</div>
        <i class="fas fa-shield-halved" onclick="openPage('admin')" style="color: var(--primary); cursor:pointer;"></i>
    </header>

    <div class="sidebar" id="sidebar">
        <h2 style="font-family:'Orbitron'; color: var(--primary); margin-bottom: 30px;">MENU</h2>
        <div class="side-item" onclick="location.reload()"><i class="fas fa-home"></i> Ana Səhifə</div>
        <div class="side-item" onclick="openPage('faq')"><i class="fas fa-info-circle"></i> Tez-tez verilən suallar</div>
        <div class="side-item" onclick="openPage('support')"><i class="fas fa-headset"></i> Canlı Dəstək</div>
        <div class="side-item" onclick="openPage('admin')"><i class="fas fa-user-lock"></i> Admin Panel</div>
        <p style="position: absolute; bottom: 20px; left: 25px; font-size: 12px; color: #444;">AXERON V2.0 DARK MODE</p>
    </div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main>
        <div class="hero-banner">
            <h2>ELAN YERLƏŞDİR - 5 AZN</h2>
            <p style="font-size: 13px; opacity: 0.8;">Sürətli, Güvənli və Professional</p>
        </div>

        <div class="grid" id="adsGrid">
            </div>
    </main>

    <a href="https://t.me/AxeronAndMee" class="fab">
        <i class="fab fa-telegram-plane"></i> ELAN VER +
    </a>

    <div id="page-admin" class="full-page">
        <div class="p-header"><i class="fas fa-chevron-left" onclick="closePage('admin')"></i> <h2>ADMİN PANEL</h2></div>
        <div class="p-body" id="adminAuth">
            <input type="password" id="admPass" placeholder="Giriş Şifrəsi">
            <button class="btn" onclick="checkAdmin()">DAXİL OL</button>
        </div>
        <div class="p-body" id="adminContent" style="display:none;">
            <div style="background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333;">
                <input type="file" id="fileInput" accept="image/*" onchange="previewImage(this)">
                <input type="text" id="aTitle" placeholder="Elan Başlığı">
                <input type="number" id="aPrice" placeholder="Qiymət (AZN)">
                <input type="text" id="aName" placeholder="Satıcı Adı">
                <input type="tel" id="aPhone" placeholder="Əlaqə Nömrəsi">
                <select id="aRegion">
                    <option>Bakı</option><option>Sumqayıt</option><option>Gəncə</option><option>Bərdə</option>
                </select>
                <textarea id="aDesc" placeholder="Məlumat..." rows="3"></textarea>
                <button class="btn" onclick="saveAd()">PAYLAŞ</button>
            </div>
            <h3 style="margin: 30px 0 15px;">ELANLARI İDARƏ ET</h3>
            <div id="adminList"></div>
        </div>
    </div>

    <div id="page-faq" class="full-page">
        <div class="p-header"><i class="fas fa-chevron-left" onclick="closePage('faq')"></i> <h2>SUALLAR</h2></div>
        <div class="p-body">
            <div style="background:var(--card); padding:15px; border-radius:15px; margin-bottom:10px;"><b>Necə ödəniş edim?</b><br>Telegram vasitəsilə M10 məlumatlarını alıb ödəniş edə bilərsiniz.</div>
        </div>
    </div>

    <script>
        // HAZIR ELANLAR (TELEFON VƏ OYUN)
        const initialAds = [
            {id: 1, title: "iPhone 15 Pro Max - 256GB", price: 2350, name: "Vaqif", phone: "0551234567", region: "Bakı", desc: "Yeni kimi, rəsmi zəmanətli.", img: "https://images.unsplash.com/photo-1696446701796-da61225697cc?auto=format&fit=crop&q=80&w=400"},
            {id: 2, title: "PUBG Mobile Hesabı - 74 Level", price: 450, name: "Elvin", phone: "0507778899", region: "Gəncə", desc: "Çoxlu setlər və silah skinləri var.", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=400"},
            {id: 3, title: "Samsung Galaxy S24 Ultra", price: 2100, name: "Kamran", phone: "0702223344", region: "Sumqayıt", desc: "Qutusu açılmayıb, bağlı qutuda.", img: "https://images.unsplash.com/photo-1610945415295-d9baf066e571?auto=format&fit=crop&q=80&w=400"},
            {id: 4, title: "Valorant Stacked Account", price: 120, name: "Nihat", phone: "0519990011", region: "Bakı", desc: "Bütün pəhləvanlar açıqdır, skinlər var.", img: "https://images.unsplash.com/photo-1542751110-97427bbecf20?auto=format&fit=crop&q=80&w=400"},
            {id: 5, title: "Brawl Stars 30K Kupa", price: 80, name: "Murad", phone: "0554443322", region: "Bərdə", desc: "Təcili satılır, qiymət sondu.", img: "https://images.unsplash.com/photo-1628277613967-6abca504d0ac?auto=format&fit=crop&q=80&w=400"}
        ];

        let ads = JSON.parse(localStorage.getItem('ax_master_ads')) || initialAds;
        let currentImage = "";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function openPage(id) {
            document.getElementById('page-' + id).style.display = 'flex';
            if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        }

        function closePage(id) { document.getElementById('page-' + id).style.display = 'none'; }

        function checkAdmin() {
            if(document.getElementById('admPass').value === "Rahim058") {
                document.getElementById('adminAuth').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                renderAdminList();
            } else { alert("Şifrə Səhvdir!"); }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => currentImage = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveAd() {
            const title = document.getElementById('aTitle').value;
            const price = document.getElementById('aPrice').value;
            if(!title || !price || !currentImage) return alert("Məlumatlar çatışmır!");

            const newAd = {
                id: Date.now(),
                title, price,
                name: document.getElementById('aName').value,
                phone: document.getElementById('aPhone').value,
                region: document.getElementById('aRegion').value,
                desc: document.getElementById('aDesc').value,
                img: currentImage
            };

            ads.unshift(newAd);
            localStorage.setItem('ax_master_ads', JSON.stringify(ads));
            renderAds();
            renderAdminList();
            alert("Uğurla əlavə edildi!");
        }

        function deleteAd(id) {
            if(confirm("Bu elanı silmək istəyirsən?")) {
                ads = ads.filter(a => a.id !== id);
                localStorage.setItem('ax_master_ads', JSON.stringify(ads));
                renderAds();
                renderAdminList();
            }
        }

        function renderAds() {
            document.getElementById('adsGrid').innerHTML = ads.map(ad => `
                <div class="ad-card" onclick="alert('📌 ${ad.title}\\n💰 ${ad.price} AZN\\n📞 ${ad.phone}')">
                    <img src="${ad.img}">
                    <div class="ad-body">
                        <div class="ad-price">${ad.price} AZN</div>
                        <div class="ad-title">${ad.title}</div>
                        <div class="ad-loc"><i class="fas fa-map-marker-alt"></i> ${ad.region}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderAdminList() {
            document.getElementById('adminList').innerHTML = ads.map(ad => `
                <div style="background:#1a1f26; padding:15px; margin-bottom:10px; border-radius:12px; display:flex; justify-content:space-between; align-items:center;">
                    <span>${ad.title}</span>
                    <button onclick="deleteAd(${ad.id})" style="color:#ff4757; background:none; border:none; font-size:18px;"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        renderAds();
    </script>
</body>
</html>
