<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXERON ELANLAR | Tap.az Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff4f08; --bg: #f6f7fa; --card: #ffffff; --text: #212c3d; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        .hidden { display: none !important; }

        /* HEADER */
        header { background: #ffffff; padding: 15px; border-bottom: 1px solid #e1e4e9; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--p); font-weight: 900; font-size: 24px; text-decoration: none; }
        .add-btn { background: var(--p); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; cursor: pointer; border: none; }

        /* HERO & CATEGORIES */
        .hero { background: #212c3d; padding: 30px 15px; text-align: center; color: white; }
        .search-box { max-width: 600px; margin: 20px auto; position: relative; }
        .search-box input { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 16px; }

        /* GRID SYSTEM */
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .section-title { margin: 20px 0; font-size: 20px; font-weight: 700; display: flex; justify-content: space-between; }
        .elan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        
        /* ELAN CARD */
        .card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 12px; }
        .price { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
        .price::after { content: ' AZN'; font-size: 14px; }
        .title { font-size: 14px; color: #707a8d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .date { font-size: 11px; color: #b2b8c4; margin-top: 10px; }
        .delete-elan { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.8); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; z-index: 10; }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        /* FOOTER NAV FOR MOBILE */
        .mobile-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; display: none; }
        @media (max-width: 600px) { .mobile-nav { display: flex; } .elan-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <a href="#" class="logo">AXERON.AZ</a>
        <div>
            <button class="add-btn" onclick="app.showModal(true)">+ YENİ ELAN</button>
            <button onclick="app.adminLogin()" style="background:none; border:none; margin-left:15px; cursor:pointer"><i class="fas fa-user-lock"></i></button>
        </div>
    </div>
</header>

<div class="hero">
    <h1>Nə axtarırsınız?</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Məsələn, iPhone 15 Pro" onkeyup="app.search()">
    </div>
</div>

<div class="container">
    <div class="section-title">
        <span>BÜTÜN ELANLAR</span>
    </div>
    <div id="elan-list" class="elan-grid">
        </div>
</div>

<div id="addModal" class="modal hidden">
    <div class="modal-content">
        <h2 style="margin-bottom:20px;">Yeni Elan</h2>
        <input type="text" id="m-title" placeholder="Məhsulun adı">
        <input type="number" id="m-price" placeholder="Qiymət (AZN)">
        <input type="text" id="m-img" placeholder="Şəkil linki (URL)">
        <select id="m-cat">
            <option value="Telefonlar">Telefonlar</option>
            <option value="Avtomobillər">Avtomobillər</option>
            <option value="Elektronika">Elektronika</option>
        </select>
        <button class="add-btn" style="width:100%" onclick="app.createElan()">PAYLAŞ</button>
        <button onclick="app.showModal(false)" style="width:100%; background:none; color:#777; border:none; margin-top:10px; cursor:pointer">Ləğv et</button>
    </div>
</div>

<script>
const app = {
    // Hazır nümunə elanlar
    elans: JSON.parse(localStorage.getItem('ax_elans')) || [
        {id: 1, title: "iPhone 13 Pro Max", price: 1450, img: "https://m.media-amazon.com/images/I/61eDXs9QFNL._AC_SL1500_.jpg", date: "Bakı, bu gün 12:45"},
        {id: 2, title: "Mercedes S-Class 2022", price: 85000, img: "https://bilasvaz.com/wp-content/uploads/2021/11/2022-mercedes-benz-s-class-mpx-1610484534.jpg", date: "Bakı, dünən 22:10"}
    ],
    isAdmin: false,

    init() {
        this.render();
    },

    render(data = this.elans) {
        let html = "";
        data.forEach(item => {
            html += `
                <div class="card">
                    ${this.isAdmin ? `<button class="delete-elan" onclick="app.deleteElan(${item.id})">Sil</button>` : ''}
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/300x200?text=Şəkil+Yoxdur'">
                    <div class="card-info">
                        <div class="price">${item.price}</div>
                        <div class="title">${item.title}</div>
                        <div class="date">${item.date}</div>
                    </div>
                </div>
            `;
        });
        document.getElementById('elan-list').innerHTML = html || "<p style='padding:20px'>Heç bir elan tapılmadı.</p>";
    },

    showModal(val) {
        document.getElementById('addModal').classList.toggle('hidden', !val);
    },

    createElan() {
        const title = document.getElementById('m-title').value;
        const price = document.getElementById('m-price').value;
        const img = document.getElementById('m-img').value;
        
        if(!title || !price) return alert("Ad və qiymət mütləqdir!");

        const newElan = {
            id: Date.now(),
            title: title,
            price: price,
            img: img || "https://via.placeholder.com/300x200",
            date: "Bakı, İndi"
        };

        this.elans.unshift(newElan);
        this.save();
        this.showModal(false);
        this.render();
        
        // Formu təmizlə
        document.getElementById('m-title').value = "";
        document.getElementById('m-price').value = "";
        document.getElementById('m-img').value = "";
    },

    deleteElan(id) {
        if(confirm("Bu elanı silmək istəyirsiniz?")) {
            this.elans = this.elans.filter(x => x.id !== id);
            this.save();
            this.render();
        }
    },

    search() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = this.elans.filter(x => x.title.toLowerCase().includes(query));
        this.render(filtered);
    },

    adminLogin() {
        const pass = prompt("Admin şifrəsini yazın:");
        if(pass === "Rahim058") {
            this.isAdmin = !this.isAdmin;
            alert(this.isAdmin ? "Admin rejimi aktivdir (Silmə düymələri açıldı)" : "Admin rejimi bağlandı");
            this.render();
        } else {
            alert("Səhv şifrə!");
        }
    },

    save() {
        localStorage.setItem('ax_elans', JSON.stringify(this.elans));
    }
};

app.init();
</script>

</body>
</html>
