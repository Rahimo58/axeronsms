<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXERON PRO | SMS & ORDER SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00f2ff; --bg: #020408; --card: #0a0e14; --border: #16212e; --text: #ffffff; --err: #ff0055; --succ: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* Ticker */
        #ticker { background: #ff0000; height: 35px; display: none; align-items: center; position: sticky; top: 0; z-index: 9999; overflow: hidden; }
        .t-move { display: inline-block; white-space: nowrap; padding-left: 100%; animation: scroll 15s linear infinite; font-weight: bold; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        .app { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; border: 1px solid var(--border); padding-bottom: 80px; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: #fff; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-p { background: var(--p); color: #000; }

        header { padding: 15px; display: flex; justify-content: space-between; background: var(--card); border-bottom: 2px solid var(--p); }
        .card { background: var(--card); border: 1px solid var(--border); margin: 10px 15px; padding: 15px; border-radius: 15px; }
        
        /* Orders Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 8px; border: 1px solid #222; text-align: left; }
        th { background: #111; color: var(--p); }

        nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #05070a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-item { color: #555; text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--p); }

        .admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="ticker"><div class="t-move" id="t-text">Sistem Aktivdir!</div></div>

<div class="app">
    <div id="auth-box" style="padding: 40px 25px; text-align: center;">
        <h1 style="font-family:'Orbitron'; color:var(--p); margin-bottom:40px;">AXERON</h1>
        <div id="login-ui">
            <input type="text" id="l-u" placeholder="İstifadəçi adı">
            <input type="password" id="l-p" placeholder="Şifrə">
            <button class="btn btn-p" onclick="sys.login()">DAXİL OL</button>
            <p style="margin-top:15px; color:var(--p)" onclick="sys.toggleAuth(false)">Hesab yarat</p>
        </div>
        <div id="reg-ui" class="hidden">
            <input type="text" id="r-u" placeholder="İstifadəçi adı">
            <input type="email" id="r-e" placeholder="E-poçt">
            <input type="password" id="r-p" placeholder="Şifrə">
            <button class="btn btn-p" onclick="sys.register()">YARAT</button>
            <p style="margin-top:15px; color:var(--p)" onclick="sys.toggleAuth(true)">Geri</p>
        </div>
    </div>

    <div id="main-box" class="hidden">
        <header>
            <i class="fas fa-history" onclick="sys.setTab('orders')"></i>
            <span style="font-family:'Orbitron';">AXERON PRO</span>
            <i class="fas fa-user-lock" onclick="sys.openAdmin()"></i>
        </header>

        <div id="tab-home">
            <div class="card" style="text-align: center; border: 1px solid var(--p);">
                <p style="font-size:11px; opacity:0.6;">BALANS</p>
                <h2 style="font-family:'Orbitron'; color:var(--p); font-size:30px;"><span id="u-bal">0.00</span> AZN</h2>
                <p id="u-id" style="font-size:10px; color:var(--p);">ID: #000000</p>
            </div>
            <div id="srv-list"></div>
        </div>

        <div id="tab-orders" class="hidden" style="padding:15px;">
            <h3 style="color:var(--p); margin-bottom:10px;">SİFARİŞLƏRİM</h3>
            <div id="my-orders-list"></div>
        </div>

        <nav>
            <div class="nav-item active" onclick="sys.setTab('home')"><i class="fas fa-home"></i><br>ANA SƏHİFƏ</div>
            <div class="nav-item" onclick="sys.setTab('orders')"><i class="fas fa-shopping-bag"></i><br>SİFARİŞLƏR</div>
            <div class="nav-item" onclick="sys.logout()" style="color:var(--err)"><i class="fas fa-power-off"></i><br>ÇIXIŞ</div>
        </nav>
    </div>

    <div id="admin-panel" class="admin-modal hidden">
        <h2 style="font-family:'Orbitron'; color:var(--p);">ADMIN PANEL</h2>
        <hr style="margin:15px 0; opacity:0.1;">
        
        <div style="background:#0d0d0d; padding:15px; border-radius:10px; margin-bottom:20px;">
            <h4 style="color:var(--succ);">BÜTÜN SİFARİŞLƏR</h4>
            <div style="overflow-x:auto;">
                <table id="admin-orders-table">
                    <thead><tr><th>İstifadəçi</th><th>Xidmət</th><th>Qiymət</th><th>Əməliyyat</th></tr></thead>
                    <tbody id="admin-orders-body"></tbody>
                </table>
            </div>
        </div>

        <div style="background:#0d0d0d; padding:15px; border-radius:10px;">
            <h4>BALANS VƏ KART</h4>
            <input type="text" id="ad-id" placeholder="İstifadəçi ID">
            <input type="number" id="ad-amt" placeholder="Məbləğ">
            <button class="btn btn-p" onclick="sys.adjBal()">BALANS YÜKLƏ</button>
            <br><br>
            <input type="text" id="ad-card" placeholder="Kart No">
            <button class="btn btn-p" onclick="sys.saveConf()">AYARLARI YADDA SAXLA</button>
        </div>
        <button class="btn" style="margin-top:20px; background:#333; color:#fff;" onclick="sys.closeAdmin()">BAĞLA</button>
    </div>
</div>

<script>
const sys = {
    db: JSON.parse(localStorage.getItem('ax_db')) || [],
    ses: JSON.parse(localStorage.getItem('ax_ses')) || null,
    orders: JSON.parse(localStorage.getItem('ax_orders')) || [],
    conf: JSON.parse(localStorage.getItem('ax_conf')) || {c: "0000 0000 0000 0000"},

    init() {
        if(this.ses) this.show();
        this.renderSrv();
    },

    register() {
        const u = document.getElementById('r-u').value;
        const p = document.getElementById('r-p').value;
        if(!u || !p) return alert("Doldur!");
        const newUser = { u, p, id: Math.floor(Math.random()*900000), bal: 0 };
        this.db.push(newUser);
        localStorage.setItem('ax_db', JSON.stringify(this.db));
        alert("Uğurlu!"); this.toggleAuth(true);
    },

    login() {
        const u = document.getElementById('l-u').value;
        const p = document.getElementById('l-p').value;
        const user = this.db.find(x => x.u == u && x.p == p);
        if(user) { this.ses = user; localStorage.setItem('ax_ses', JSON.stringify(user)); this.show(); }
        else alert("Səhv!");
    },

    show() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('main-box').classList.remove('hidden');
        document.getElementById('u-bal').innerText = this.ses.bal.toFixed(2);
        document.getElementById('u-id').innerText = "ID: #" + this.ses.id;
        this.renderMyOrders();
    },

    renderSrv() {
        const srvs = [{n:"Telegram", p:0.2}, {n:"WhatsApp", p:0.5}, {n:"Instagram", p:0.1}];
        let h = "";
        srvs.forEach(s => h += `<div class="card" onclick="sys.buy('${s.n}', ${s.p})"><b>${s.n}</b> <span style="float:right; color:var(--p)">${s.p} AZN</span></div>`);
        document.getElementById('srv-list').innerHTML = h;
    },

    buy(name, price) {
        if(this.ses.bal < price) return alert("Balans yoxdur!");
        if(confirm(name + " Alınsın?")) {
            this.ses.bal -= price;
            const order = { id: Date.now(), user: this.ses.u, uid: this.ses.id, item: name, price: price, status: 'Tamamlandı' };
            this.orders.push(order);
            
            // Database update
            let uIdx = this.db.findIndex(x => x.id == this.ses.id);
            this.db[uIdx].bal = this.ses.bal;
            
            localStorage.setItem('ax_orders', JSON.stringify(this.orders));
            localStorage.setItem('ax_db', JSON.stringify(this.db));
            localStorage.setItem('ax_ses', JSON.stringify(this.ses));
            this.show();
            alert("Sifariş verildi!");
        }
    },

    renderMyOrders() {
        let h = "";
        const my = this.orders.filter(o => o.uid == this.ses.id);
        my.forEach(o => h += `<div class="card" style="font-size:12px">📦 ${o.item} - ${o.price} AZN <br> <small>${o.status}</small></div>`);
        document.getElementById('my-orders-list').innerHTML = h || "Sifariş yoxdur.";
    },

    // ADMIN
    openAdmin() {
        if(prompt("PİN:") == "Rahim058") {
            document.getElementById('admin-panel').classList.remove('hidden');
            this.renderAdminOrders();
        }
    },

    renderAdminOrders() {
        let h = "";
        this.orders.forEach((o, index) => {
            h += `<tr>
                <td>${o.user}</td>
                <td>${o.item}</td>
                <td>${o.price}</td>
                <td><button onclick="sys.cancelOrder(${index})" style="background:red; color:white; border:none; padding:3px 7px; border-radius:5px;">Ləğv Et</button></td>
            </tr>`;
        });
        document.getElementById('admin-orders-body').innerHTML = h;
    },

    cancelOrder(index) {
        const o = this.orders[index];
        // Balansı geri qaytar
        let uIdx = this.db.findIndex(x => x.id == o.uid);
        if(uIdx !== -1) {
            this.db[uIdx].bal += o.price;
            if(this.ses.id == o.uid) this.ses.bal += o.price;
        }
        this.orders.splice(index, 1);
        localStorage.setItem('ax_db', JSON.stringify(this.db));
        localStorage.setItem('ax_orders', JSON.stringify(this.orders));
        localStorage.setItem('ax_ses', JSON.stringify(this.ses));
        this.renderAdminOrders();
        this.show();
        alert("Sifariş ləğv edildi və pul geri qaytarıldı!");
    },

    adjBal() {
        const id = document.getElementById('ad-id').value;
        const amt = parseFloat(document.getElementById('ad-amt').value);
        let u = this.db.find(x => x.id == id);
        if(u) { u.bal += amt; localStorage.setItem('ax_db', JSON.stringify(this.db)); alert("Ok!"); }
    },

    setTab(t) {
        document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
        document.getElementById('tab-orders').classList.toggle('hidden', t !== 'orders');
    },

    closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); },
    toggleAuth(l) { document.getElementById('login-ui').classList.toggle('hidden', !l); document.getElementById('reg-ui').classList.toggle('hidden', l); },
    logout() { localStorage.removeItem('ax_ses'); location.reload(); }
};
sys.init();
</script>
</body>
</html>
