<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXERON ULTIMATE | SMM & SMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00f2ff; --bg: #020408; --card: #0a0e14; --border: #16212e; --text: #ffffff; --err: #ff0055; --succ: #00ff88; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani', sans-serif; outline: none; }
        body { background: var(--bg); color: var(--text); }
        .hidden { display: none !important; }

        /* HEADER */
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 2px solid var(--p); position: sticky; top:0; z-index: 1000; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; border: 1px solid var(--border); padding-bottom: 80px; position: relative; }

        /* CARDS */
        .wallet-card { background: linear-gradient(135deg, #0d1117, #002b2e); margin: 15px; padding: 25px; border-radius: 20px; border: 1px solid var(--p); text-align: center; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        .srv-box { background: var(--card); border: 1px solid var(--border); margin: 10px 15px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; cursor: pointer; }
        .srv-box:hover { border-color: var(--p); background: #0d121a; }

        /* FORM ELEMENTS */
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; background: var(--card); border: 1px solid var(--border); color: #fff; border-radius: 10px; font-size: 16px; }
        .btn-p { width: 100%; padding: 15px; border-radius: 10px; border: none; font-family: 'Orbitron'; font-weight: 900; background: var(--p); color: #000; cursor: pointer; }
        
        /* ADMIN PANEL & TABLES */
        .admin-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; padding: 20px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; }
        th, td { padding: 10px; border: 1px solid #222; text-align: left; }
        th { background: #111; color: var(--p); }

        /* NAVIGATION */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #05070a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .n-tab { color: #555; text-align: center; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .n-tab.active { color: var(--p); }
    </style>
</head>
<body>

<div class="container">
    <div id="view-auth" style="padding: 50px 30px; text-align: center;">
        <h1 style="font-family:'Orbitron'; color:var(--p); font-size: 45px; margin-bottom: 40px;">AXERON</h1>
        <div id="login-form">
            <input type="text" id="l-u" placeholder="İstifadəçi adı">
            <input type="password" id="l-p" placeholder="Şifrə">
            <button class="btn-p" onclick="sys.login()">DAXİL OL</button>
            <p style="margin-top:20px; color:var(--p); cursor:pointer" onclick="sys.toggleAuth(false)">Qeydiyyatdan keç</p>
        </div>
        <div id="reg-form" class="hidden">
            <input type="text" id="r-u" placeholder="Yeni İstifadəçi">
            <input type="password" id="r-p" placeholder="Şifrə">
            <button class="btn-p" onclick="sys.register()">HESABI YARAT</button>
            <p style="margin-top:20px; color:var(--p); cursor:pointer" onclick="sys.toggleAuth(true)">Geri qayıt</p>
        </div>
    </div>

    <div id="view-app" class="hidden">
        <header>
            <i class="fas fa-history" onclick="sys.setTab('orders')"></i>
            <span style="font-family:'Orbitron'; font-weight:900; letter-spacing:1px;">AXERON PANEL</span>
            <i class="fas fa-user-shield" onclick="sys.openAdmin()"></i>
        </header>

        <div id="tab-home">
            <div class="wallet-card">
                <p style="font-size:10px; opacity:0.6; letter-spacing:2px;">CARI BALANS</p>
                <h2 style="font-family:'Orbitron'; color:var(--p); font-size:35px; margin:5px 0;"><span id="u-bal">0.00</span> AZN</h2>
                <p id="u-id" style="font-size:11px; color:var(--p);">ID: #000000</p>
            </div>
            
            <div style="padding:0 15px;">
                <select id="srv-cat" onchange="sys.renderSrv()">
                    <option value="tg">Telegram Xidmətləri</option>
                    <option value="ig">Instagram Xidmətləri</option>
                    <option value="wa">WhatsApp (SMS)</option>
                </select>
                <div id="srv-list"></div>
            </div>
        </div>

        <div id="tab-orders" class="hidden" style="padding: 20px;">
            <h3 style="color:var(--p); margin-bottom:15px; font-family:'Orbitron';">SİFARİŞLƏRİM</h3>
            <div id="my-orders-log"></div>
        </div>

        <div id="tab-pay" class="hidden" style="padding: 20px;">
            <h3 style="color:var(--p); margin-bottom:20px; text-align:center;">BALANS ARTIR</h3>
            <div style="background:#0d0d0d; padding:25px; border-radius:20px; border:1px dashed var(--p); text-align:center;">
                <p id="c-no" style="font-size:18px; letter-spacing:2px; font-weight:bold; color:#fff;">0000 0000 0000 0000</p>
                <p id="c-nm" style="color:var(--p); margin-top:10px;">AD SOYAD</p>
            </div>
            <p style="font-size:12px; text-align:center; margin-top:15px; color:var(--err);">Ödənişdən sonra qəbzi Adminə göndərin!</p>
        </div>

        <nav>
            <div class="n-tab active" onclick="sys.setTab('home')"><i class="fas fa-home fa-lg"></i><br>HOME</div>
            <div class="n-tab" onclick="sys.setTab('pay')"><i class="fas fa-wallet fa-lg"></i><br>PAY</div>
            <div class="n-tab" onclick="sys.logout()" style="color:var(--err)"><i class="fas fa-power-off fa-lg"></i><br>EXIT</div>
        </nav>
    </div>

    <div id="view-admin" class="admin-screen hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-family:'Orbitron'; color:var(--err);">ADMIN DASHBOARD</h2>
            <button onclick="sys.closeAdmin()" style="background:#222; border:none; color:#fff; padding:8px 15px; border-radius:5px;">X</button>
        </div>

        <div style="background:#0d0d0d; padding:15px; border-radius:12px; border:1px solid #333; margin-bottom:20px;">
            <h4 style="color:var(--succ);">GƏLƏN SİFARİŞLƏR</h4>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>User</th><th>Xidmət</th><th>Məbləğ</th><th>İdarə</th></tr></thead>
                    <tbody id="adm-orders-list"></tbody>
                </table>
            </div>
        </div>

        <div style="background:#0d0d0d; padding:15px; border-radius:12px; border:1px solid #333;">
            <h4>İSTİFADƏÇİ & KART</h4>
            <input type="text" id="adm-uid" placeholder="İstifadəçi ID">
            <input type="number" id="adm-amt" placeholder="Məbləğ (+/-)">
            <button class="btn-p" onclick="sys.admUpdateBal()">BALANS DƏYİŞ</button>
            <hr style="margin:20px 0; opacity:0.1;">
            <input type="text" id="adm-c-no" placeholder="Kart Nömrəsi">
            <input type="text" id="adm-c-nm" placeholder="Kart Sahibi">
            <button class="btn-p" onclick="sys.admUpdateCard()">KARTI YADDA SAXLA</button>
        </div>
    </div>
</div>

<script>
const sys = {
    db: JSON.parse(localStorage.getItem('ax_db')) || [],
    ses: JSON.parse(localStorage.getItem('ax_ses')) || null,
    orders: JSON.parse(localStorage.getItem('ax_orders')) || [],
    conf: JSON.parse(localStorage.getItem('ax_conf')) || {c:"4127 0000 0000 0000", n:"RAHIM PRO"},

    init() {
        if(this.ses) this.showApp();
        this.renderSrv();
        this.updateCardUI();
    },

    register() {
        const u = document.getElementById('r-u').value.trim();
        const p = document.getElementById('r-p').value.trim();
        if(!u || !p) return alert("Bütün xanaları doldur!");
        if(this.db.find(x => x.u == u)) return alert("Bu ad artıq mövcuddur!");

        const user = { u, p, id: Math.floor(100000 + Math.random()*900000), bal: 0 };
        this.db.push(user);
        this.save();
        alert("Qeydiyyat uğurlu! Giriş edə bilərsiniz.");
        this.toggleAuth(true);
    },

    login() {
        const u = document.getElementById('l-u').value.trim();
        const p = document.getElementById('l-p').value.trim();
        const user = this.db.find(x => x.u == u && x.p == p);
        if(user) {
            this.ses = user;
            localStorage.setItem('ax_ses', JSON.stringify(user));
            this.showApp();
        } else alert("İstifadəçi adı və ya şifrə səhvdir!");
    },

    showApp() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-app').classList.remove('hidden');
        document.getElementById('u-bal').innerText = this.ses.bal.toFixed(2);
        document.getElementById('u-id').innerText = "ID: #" + this.ses.id;
        this.renderMyOrders();
    },

    renderSrv() {
        const cat = document.getElementById('srv-cat').value;
        const srvs = {
            tg: [{n:"Telegram Member (Real)", p:0.40}, {n:"Telegram Post View", p:0.05}],
            ig: [{n:"Instagram Follower", p:0.25}, {n:"Instagram Likes", p:0.10}],
            wa: [{n:"WhatsApp TR SMS", p:0.90}, {n:"WhatsApp RU SMS", p:0.75}]
        };
        let h = "";
        srvs[cat].forEach(s => {
            h += `<div class="srv-box" onclick="sys.buy('${s.n}', ${s.p})">
                    <b>${s.n}</b>
                    <span style="color:var(--p); font-weight:bold;">${s.p} AZN</span>
                  </div>`;
        });
        document.getElementById('srv-list').innerHTML = h;
    },

    buy(name, price) {
        if(this.ses.bal < price) return alert("Kifayət qədər balansınız yoxdur!");
        if(confirm(name + " almaq istəyirsiniz?")) {
            this.ses.bal -= price;
            const order = { oid: Date.now(), u: this.ses.u, uid: this.ses.id, item: name, pr: price, status: "Gözləmədə" };
            this.orders.push(order);
            
            // Sync database
            let uIdx = this.db.findIndex(x => x.id == this.ses.id);
            this.db[uIdx].bal = this.ses.bal;
            
            this.sync();
            this.showApp();
            alert("Sifariş uğurla verildi!");
        }
    },

    renderMyOrders() {
        let h = "";
        this.orders.filter(o => o.uid == this.ses.id).forEach(o => {
            h += `<div class="srv-box" style="font-size:12px">
                    <div><b>${o.item}</b><br><small style="color:var(--p)">${o.status}</small></div>
                    <b>${o.pr} AZN</b>
                  </div>`;
        });
        document.getElementById('my-orders-log').innerHTML = h || "<p style='text-align:center; opacity:0.5'>Sifariş tapılmadı.</p>";
    },

    // ADMIN LOGIC
    openAdmin() {
        if(prompt("Admin Giriş Şifrəsi:") === "Rahim058") {
            document.getElementById('view-admin').classList.remove('hidden');
            this.renderAdminOrders();
        }
    },

    renderAdminOrders() {
        let h = "";
        this.orders.forEach((o, i) => {
            h += `<tr>
                    <td>${o.u}</td>
                    <td>${o.item}</td>
                    <td>${o.pr}</td>
                    <td><button onclick="sys.admCancel(${i})" style="background:var(--err); color:#fff; border:none; padding:5px; border-radius:5px; cursor:pointer">Ləğv Et</button></td>
                  </tr>`;
        });
        document.getElementById('adm-orders-list').innerHTML = h;
    },

    admCancel(index) {
        const o = this.orders[index];
        let user = this.db.find(x => x.id == o.uid);
        if(user) {
            user.bal += o.pr;
            if(this.ses && this.ses.id == o.uid) this.ses.bal = user.bal;
        }
        this.orders.splice(index, 1);
        this.sync();
        this.renderAdminOrders();
        this.showApp();
        alert("Sifariş ləğv edildi və məbləğ geri qaytarıldı!");
    },

    admUpdateBal() {
        const id = document.getElementById('adm-uid').value;
        const amt = parseFloat(document.getElementById('adm-amt').value);
        let u = this.db.find(x => x.id == id);
        if(u) {
            u.bal += amt;
            if(this.ses && this.ses.id == id) this.ses.bal = u.bal;
            this.sync();
            alert("Uğurla yeniləndi!");
        } else alert("İstifadəçi tapılmadı!");
    },

    admUpdateCard() {
        this.conf.c = document.getElementById('adm-c-no').value || this.conf.c;
        this.conf.n = document.getElementById('adm-c-nm').value || this.conf.n;
        localStorage.setItem('ax_conf', JSON.stringify(this.conf));
        this.updateCardUI();
        alert("Kart məlumatları yeniləndi!");
    },

    updateCardUI() {
        document.getElementById('c-no').innerText = this.conf.c;
        document.getElementById('c-nm').innerText = this.conf.n;
    },

    sync() { this.save(); localStorage.setItem('ax_ses', JSON.stringify(this.ses)); localStorage.setItem('ax_orders', JSON.stringify(this.orders)); },
    save() { localStorage.setItem('ax_db', JSON.stringify(this.db)); },
    setTab(t) { 
        ['home', 'orders', 'pay'].forEach(x => document.getElementById('tab-'+x).classList.add('hidden')); 
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.querySelectorAll('.n-tab').forEach(el => el.classList.remove('active'));
    },
    closeAdmin() { document.getElementById('view-admin').classList.add('hidden'); },
    toggleAuth(l) { document.getElementById('login-form').classList.toggle('hidden', !l); document.getElementById('reg-form').classList.toggle('hidden', l); },
    logout() { localStorage.removeItem('ax_ses'); location.reload(); }
};
sys.init();
</script>
</body>
</html>
