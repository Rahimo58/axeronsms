<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axeron | Premium Ads</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #00f2ff; --bg: #0a0b10; --card: #161b22; --text: #ffffff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-top: 60px; }

        /* HEADER */
        header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: var(--card); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 1000;
            border-bottom: 1px solid #2d333b;
        }
        .logo { color: var(--main); font-weight: 800; font-size: 22px; text-transform: uppercase; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
            background: var(--card); z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; border-right: 1px solid var(--main);
        }
        .sidebar.active { left: 0; }
        .side-item { padding: 15px; color: #adbac7; display: flex; align-items: center; gap: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; }
        .side-item:hover { background: #22272e; color: var(--main); }

        /* SEARCH BAR (TAP.AZ STYLE) */
        .search-area { padding: 15px; }
        .search-box { background: var(--card); border: 1px solid #2d333b; border-radius: 8px; padding: 12px; display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        /* CATEGORIES */
        .cats { display: flex; gap: 10px; overflow-x: auto; padding: 10px 15px; scrollbar-width: none; }
        .cat-chip { background: #22272e; padding: 8px 18px; border-radius: 20px; white-space: nowrap; font-size: 14px; border: 1px solid #2d333b; cursor: pointer; }
        .cat-chip:active { border-color: var(--main); color: var(--main); }

        /* ADS GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d333b; position: relative; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 12px; }
        .price { color: var(--main); font-weight: 700; font-size: 18px; margin-bottom: 4px; }
        .title { font-size: 14px; color: #adbac7; height: 34px; overflow: hidden; line-height: 1.2; }

        /* ADMIN PANEL */
        .admin-page { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; padding: 20px; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; background: #22272e; border: 1px solid #2d333b; color: white; border-radius: 10px; }
        .btn { background: var(--main); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-del { color: #ff4444; cursor: pointer; font-size: 18px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--main); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 25px; box-shadow: 0 4px 15px rgba(0,242,255,0.3); z-index: 1000; }
    </style>
</head>
<body>

<header>
    <i class="fas fa-bars" onclick="toggleSide()" style="font-size: 20px;"></i>
    <div class="logo">AXERON</div>
    <i class="fas fa-user-shield" onclick="openAdmin()" style="opacity: 0.5;"></i>
</header>

<div class="sidebar" id="sidebar">
    <h2 style="margin-bottom: 25px; color: var(--main);">Menyu</h2>
    <div class="side-item" onclick="location.reload()"><i class="fas fa-th-large"></i> Bütün Elanlar</div>
    <div class="side-item" onclick="filterAds('Telefon')"><i class="fas fa-mobile-alt"></i> Telefonlar</div>
    <div class="side-item" onclick="filterAds('Oyun')"><i class="fas fa-gamepad"></i> Oyun Hesabları</div>
    <hr style="border: 0.5px solid #2d333b; margin: 15px 0;">
    <div class="side-item" onclick="alert('Axeron V1.0 \nProfessional Elan Sistemi')"><i class="fas fa-info-circle"></i> Sayt Haqqında</div>
    <div class="side-item" onclick="openAdmin()"><i class="fas fa-lock"></i> Admin Girişi</div>
</div>
<div class="overlay" id="overlay" onclick="toggleSide()"></div>

<main>
    <div class="search-area">
        <div class="search-box">
            <i class="fas fa-search" style="color: #adbac7;"></i>
            <input type="text" placeholder="Əşya və ya xidmət axtarın...">
        </div>
    </div>

    <div class="cats">
        <div class="cat-chip" onclick="filterAds('all')">Hamısı</div>
        <div class="cat-chip" onclick="filterAds('Telefon')">Telefonlar</div>
        <div class="cat-chip" onclick="filterAds('Oyun')">Oyunlar</div>
        <div class="cat-chip" onclick="filterAds('Digər')">Digər</div>
    </div>

    <div class="grid" id="adGrid"></div>
</main>

<div id="adminPage" class="admin-page">
    <div style="display:flex; justify-content:space-between; margin-bottom:25px;">
        <h2>Admin Panel</h2>
        <i class="fas fa-times" onclick="closeAdmin()" style="font-size: 24px;"></i>
    </div>

    <div id="loginSection">
        <input type="password" id="passInp" placeholder="Şifrə">
        <button class="btn" onclick="checkPass()">DAXİL OL</button>
    </div>

    <div id="mainSection" style="display:none;">
        <h4 style="margin-bottom: 10px;">Yeni Elan Əlavə Et</h4>
        <input type="file" id="fImg" onchange="encodeImg(this)">
        <input type="text" id="fTitle" placeholder="Elan başlığı">
        <input type="number" id="fPrice" placeholder="Qiymət (AZN)">
        <select id="fCat">
            <option>Telefon</option>
            <option>Oyun</option>
            <option>Digər</option>
        </select>
        <button class="btn" onclick="saveAd()">PAYLAŞ</button>

        <h4 style="margin: 30px 0 10px;">Elanları İdarə Et (Sil)</h4>
        <div id="admList"></div>
    </div>
</div>

<a href="https://t.me/AxeronAndMee" class="fab"><i class="fas fa-plus"></i></a>

<script>
    let ads = JSON.parse(localStorage.getItem('ax_db')) || [
        {id:1, title:"iPhone 15 Pro Max - Təzə", price:2450, cat:"Telefon", img:"https://images.unsplash.com/photo-1696446701796-da61225697cc?w=400"},
        {id:2, title:"PUBG 75 Level Hesab", price:400, cat:"Oyun", img:"https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400"}
    ];
    let tempImg = "";

    function toggleSide() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    }

    function openAdmin() { document.getElementById('adminPage').style.display = 'block'; if(document.getElementById('sidebar').classList.contains('active')) toggleSide(); }
    function closeAdmin() { document.getElementById('adminPage').style.display = 'none'; }

    function checkPass() {
        if(document.getElementById('passInp').value === "Rahim058") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainSection').style.display = 'block';
            renderAdmin();
        } else { alert("Yanlış şifrə!"); }
    }

    function encodeImg(input) {
        let reader = new FileReader();
        reader.onload = (e) => tempImg = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }

    function saveAd() {
        let t = document.getElementById('fTitle').value;
        let p = document.getElementById('fPrice').value;
        if(!t || !p || !tempImg) return alert("Məlumatları doldurun!");
        ads.unshift({id:Date.now(), title:t, price:p, cat:document.getElementById('fCat').value, img:tempImg});
        localStorage.setItem('ax_db', JSON.stringify(ads));
        renderAll(); renderAdmin(); alert("Əlavə edildi!");
    }

    function deleteAd(id) {
        if(confirm("Silinsin?")) {
            ads = ads.filter(a => a.id !== id);
            localStorage.setItem('ax_db', JSON.stringify(ads));
            renderAll(); renderAdmin();
        }
    }

    function filterAds(c) {
        if(c === 'all') renderAll(ads);
        else renderAll(ads.filter(a => a.cat === c));
        if(document.getElementById('sidebar').classList.contains('active')) toggleSide();
    }

    function renderAll(data = ads) {
        document.getElementById('adGrid').innerHTML = data.map(a => `
            <div class="card" onclick="alert('${a.title}\\nQiymət: ${a.price} AZN')">
                <img src="${a.img}">
                <div class="card-body">
                    <div class="price">${a.price} AZN</div>
                    <div class="title">${a.title}</div>
                </div>
            </div>
        `).join('');
    }

    function renderAdmin() {
        document.getElementById('admList').innerHTML = ads.map(a => `
            <div style="background:#22272e; padding:12px; margin-bottom:8px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                <span>${a.title}</span>
                <i class="fas fa-trash-alt btn-del" onclick="deleteAd(${a.id})"></i>
            </div>
        `).join('');
    }

    renderAll();
</script>

</body>
</html>
