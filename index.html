<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axeron Creator | Dinamik İdarəetmə</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --bg: #050608; --card: #12141d; --text: #ffffff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-top: 65px; }

        /* HEADER */
        header { 
            position: fixed; top: 0; width: 100%; height: 65px; 
            background: var(--card); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 1000;
            border-bottom: 2px solid var(--neon);
        }
        .logo { color: var(--neon); font-weight: bold; font-size: 20px; letter-spacing: 2px; }

        /* DYNAMIC SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
            background: var(--card); z-index: 2000; transition: 0.3s;
            padding: 20px; border-right: 1px solid var(--neon);
        }
        .sidebar.active { left: 0; }
        .side-item { padding: 15px; color: #ccc; display: flex; align-items: center; gap: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; text-decoration: none; }
        .side-item:hover { background: #1a1d26; color: var(--neon); }

        /* GRID */
        .container { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card-body { padding: 10px; }
        .price { color: var(--neon); font-weight: bold; font-size: 17px; }

        /* ADMIN PANEL */
        .page { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; padding: 20px; overflow-y: auto; }
        .page-head { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .btn { background: var(--neon); color: #000; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        .admin-box { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #444; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }
        
        /* DELETE ICON */
        .del-btn { color: #ff4757; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <i class="fas fa-bars" onclick="toggleSide()" style="font-size: 22px;"></i>
    <div class="logo">AXERON CREATOR</div>
    <div onclick="openAdmin()" style="cursor:pointer; color:var(--neon); font-size: 18px;"><i class="fas fa-user-cog"></i></div>
</header>

<div class="sidebar" id="sidebar">
    <h3 style="color: var(--neon); margin-bottom: 15px;">MENYU</h3>
    <div id="dynamic-menu-list">
        </div>
    <hr style="border-color: #333; margin: 15px 0;">
    <div class="side-item" onclick="openAdmin()"><i class="fas fa-plus-circle"></i> Düymə Əlavə Et</div>
</div>
<div class="overlay" id="overlay" onclick="toggleSide()"></div>

<main class="container">
    <div style="background: linear-gradient(45deg, #7000ff, #00f2ff); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
        <h2 id="s-title">Axeron Elan Platforması</h2>
        <p id="s-desc">Sən idarə et, sən yarat!</p>
    </div>
    <div class="grid" id="adGrid"></div>
</main>

<div id="p-admin" class="page">
    <div class="page-head"><i class="fas fa-times" onclick="closeAdmin()"></i> Master Kontrol</div>
    
    <div id="admAuth">
        <input type="password" id="admPass" placeholder="Master Şifrə">
        <button class="btn" onclick="checkAdm()">DAXİL OL</button>
    </div>

    <div id="admContent" style="display:none;">
        
        <div class="admin-box">
            <h4><i class="fas fa-link"></i> Yeni Menyu Düyməsi Yarad</h4><br>
            <input type="text" id="mName" placeholder="Düymənin adı (Məs: VIP Elanlar)">
            <input type="text" id="mLink" placeholder="Link (Məs: https://t.me/Axeron)">
            <input type="text" id="mIcon" placeholder="İcon kodu (Məs: fas fa-star)">
            <button class="btn" onclick="addMenu()">DÜYMƏNİ ƏLAVƏ ET</button>
            
            <div id="admMenuList" style="margin-top:10px;"></div>
        </div>

        <div class="admin-box">
            <h4><i class="fas fa-plus"></i> Yeni Elan</h4><br>
            <input type="file" id="fImg" onchange="encodeImg(this)">
            <input type="text" id="fTitle" placeholder="Məhsul adı">
            <input type="number" id="fPrice" placeholder="Qiymət">
            <button class="btn" onclick="addAd()">ELANI PAYLAŞ</button>
        </div>

        <div class="admin-box">
            <h4><i class="fas fa-tools"></i> Başlıq Yazıları</h4><br>
            <input type="text" id="set-t" placeholder="Böyük Başlıq">
            <input type="text" id="set-d" placeholder="Alt Yazı">
            <button class="btn" onclick="saveText()">YADDA SAXLA</button>
        </div>

        <button class="btn" style="background:#333; color:white;" onclick="resetSite()">SAYTI SIFIRLA</button>
    </div>
</div>

<script>
    // DATA
    let ads = JSON.parse(localStorage.getItem('ax_ads')) || [];
    let menus = JSON.parse(localStorage.getItem('ax_menus')) || [
        {name: "Ana Səhifə", link: "#", icon: "fas fa-home"},
        {name: "Canlı Dəstək", link: "https://t.me/AxeronAndMee", icon: "fas fa-headset"}
    ];
    let settings = JSON.parse(localStorage.getItem('ax_set')) || {t: "Axeron Elan", d: "Sən idarə et!"};
    let tmpImg = "";

    // INTERFACE
    function toggleSide() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    }
    function openAdmin() { document.getElementById('p-admin').style.display = 'block'; }
    function closeAdmin() { document.getElementById('p-admin').style.display = 'none'; }

    function checkAdm() {
        if(document.getElementById('admPass').value === "Rahim058") {
            document.getElementById('admAuth').style.display = 'none';
            document.getElementById('admContent').style.display = 'block';
            renderAdminTools();
        }
    }

    // MENU LOGIC
    function addMenu() {
        let n = document.getElementById('mName').value;
        let l = document.getElementById('mLink').value;
        let i = document.getElementById('mIcon').value || "fas fa-circle";
        if(n && l) {
            menus.push({name: n, link: l, icon: i});
            localStorage.setItem('ax_menus', JSON.stringify(menus));
            renderAll();
            renderAdminTools();
        }
    }

    function delMenu(index) {
        menus.splice(index, 1);
        localStorage.setItem('ax_menus', JSON.stringify(menus));
        renderAll();
        renderAdminTools();
    }

    // ADS LOGIC
    function encodeImg(input) {
        let reader = new FileReader();
        reader.onload = (e) => tmpImg = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }

    function addAd() {
        ads.unshift({id:Date.now(), title:document.getElementById('fTitle').value, price:document.getElementById('fPrice').value, img:tmpImg});
        localStorage.setItem('ax_ads', JSON.stringify(ads));
        renderAll();
    }

    // SETTINGS
    function saveText() {
        settings.t = document.getElementById('set-t').value;
        settings.d = document.getElementById('set-d').value;
        localStorage.setItem('ax_set', JSON.stringify(settings));
        renderAll();
    }

    function resetSite() { if(confirm("Hər şey silinsin?")) { localStorage.clear(); location.reload(); } }

    // RENDER ALL
    function renderAll() {
        // Render Header & Texts
        document.getElementById('s-title').innerText = settings.t;
        document.getElementById('s-desc').innerText = settings.d;

        // Render Dynamic Sidebar Menus
        document.getElementById('dynamic-menu-list').innerHTML = menus.map(m => `
            <a href="${m.link}" class="side-item">
                <i class="${m.icon}"></i> ${m.name}
            </a>
        `).join('');

        // Render Ads
        document.getElementById('adGrid').innerHTML = ads.map(a => `
            <div class="card">
                <img src="${a.img || 'https://via.placeholder.com/150'}">
                <div class="card-body">
                    <div class="price">${a.price} AZN</div>
                    <div style="font-size:13px; margin-top:5px;">${a.title}</div>
                </div>
            </div>
        `).join('');
    }

    function renderAdminTools() {
        document.getElementById('admMenuList').innerHTML = "<h5>Mövcud Düymələr:</h5>" + menus.map((m, i) => `
            <div style="display:flex; justify-content:space-between; padding:8px; background:#222; margin-top:5px; border-radius:5px; font-size:14px;">
                <span><i class="${m.icon}"></i> ${m.name}</span>
                <i class="fas fa-trash del-btn" onclick="delMenu(${i})"></i>
            </div>
        `).join('');
    }

    renderAll();
</script>

</body>
</html>
