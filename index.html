<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axeron SMS | Ultimate Panel</title>
    <style>
        :root { --primary: #00d2ff; --bg: #05070a; --card: #0f1218; --text: #ffffff; --green: #00ff88; --red: #ff3e3e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        h2, h3 { text-align: center; color: var(--primary); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #161b22; color: white; box-sizing: border-box; font-size: 15px; outline: none; }
        button { background: var(--primary); color: #000; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .hidden { display: none; }
        .service-card { background: #1c2128; padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
        .balance-box { background: linear-gradient(45deg, #0f1218, #1c2128); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; border: 1px dashed var(--primary); }
        .admin-link { color: #444; font-size: 11px; text-decoration: none; display: block; text-align: center; margin-top: 15px; }
        .logout-btn { background: var(--red); color: white; margin-top: 10px; }
        .api-status { font-size: 12px; color: var(--green); margin-bottom: 10px; display: block; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-box">
        <h2 id="auth-title">Xoş Gəldiniz</h2>
        <input type="text" id="username" placeholder="İstifadəçi adı">
        <input type="password" id="password" placeholder="Şifrə">
        <button onclick="handleAuth()" id="main-btn">Daxil Ol</button>
        <p onclick="toggleAuth()" id="toggle-text" style="font-size:13px; text-align:center; cursor:pointer; color:var(--primary)">Hesabınız yoxdur? Qeydiyyatdan keçin</p>
    </div>

    <div id="user-panel" class="hidden">
        <div class="balance-box">
            <h4 style="margin:0; color:#888;">Xoş gəldin, <span id="user-display" style="color:white"></span></h4>
            <h1 style="margin:10px 0; color:var(--green);"><span id="balance-amount">0.00</span> AZN</h1>
        </div>
        
        <h3>Mövcud Xidmətlər</h3>
        <div id="services-list"></div>
        
        <button onclick="logout()" class="logout-btn">Hesabdan Çıx</button>
        <a href="#" onclick="openAdmin()" class="admin-link">Sistem İdarəetməsi (7788)</a>
    </div>

    <div id="admin-panel" class="hidden">
        <h3>Admin İdarəetmə</h3>
        <span class="api-status">● API Sistemi Aktivdir</span>
        
        <label style="font-size:12px; color:var(--primary)">API Key Redaktə:</label>
        <input type="text" id="api-key" placeholder="API Key daxil edin" value="AXERON-8877-X">
        
        <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
        
        <label style="font-size:12px; color:var(--primary)">Yeni Xidmət/Qiymət:</label>
        <input type="text" id="new-srv-name" placeholder="Xidmət adı (Məs: SMS Aktivasiya)">
        <input type="number" id="new-srv-price" placeholder="Qiymət (AZN)">
        <button onclick="addService()" style="background:var(--green)">+ Bazaya Əlavə Et</button>
        
        <div id="admin-services-list" style="margin-top:20px;"></div>
        
        <button onclick="closeAdmin()" style="background:#333; color:white;">Geri Qayıt</button>
    </div>
</div>

<script>
    let isLoginMode = true;
    let services = JSON.parse(localStorage.getItem('axeron_services')) || [
        { name: "Telegram SMS", price: 0.25 },
        { name: "Instagram Takipçi", price: 0.60 }
    ];

    window.onload = () => {
        const activeUser = localStorage.getItem('axeron_session');
        if (activeUser) {
            showUserPanel(activeUser);
        }
        renderServices();
    };

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Giriş" : "Qeydiyyat";
        document.getElementById('main-btn').innerText = isLoginMode ? "Daxil Ol" : "Hesabı Yarat";
        document.getElementById('toggle-text').innerText = isLoginMode ? "Hesabınız yoxdur? Qeydiyyat" : "Hesabınız var? Giriş edin";
    }

    function handleAuth() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();

        if (!u || !p) return alert("Bütün xanaları doldurun!");

        if (isLoginMode) {
            const userData = JSON.parse(localStorage.getItem('user_' + u));
            if (userData && userData.password === p) {
                localStorage.setItem('axeron_session', u);
                showUserPanel(u);
            } else {
                alert("İstifadəçi adı və ya şifrə səhvdir!");
            }
        } else {
            const newUser = { username: u, password: p, balance: 0.00 };
            localStorage.setItem('user_' + u, JSON.stringify(newUser));
            alert("Qeydiyyat uğurludur! İndi giriş edin.");
            toggleAuth();
        }
    }

    function showUserPanel(u) {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('user-panel').classList.remove('hidden');
        document.getElementById('user-display').innerText = u;
        const data = JSON.parse(localStorage.getItem('user_' + u));
        document.getElementById('balance-amount').innerText = data.balance.toFixed(2);
    }

    function logout() {
        localStorage.removeItem('axeron_session');
        location.reload();
    }

    function openAdmin() {
        const pass = prompt("Admin kodunu daxil edin:");
        if (pass === "7788") {
            document.getElementById('user-panel').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            renderAdminServices();
        } else {
            alert("Giriş qadağandır!");
        }
    }

    function addService() {
        const name = document.getElementById('new-srv-name').value;
        const price = document.getElementById('new-srv-price').value;

        if (name && price) {
            services.push({ name: name, price: parseFloat(price) });
            localStorage.setItem('axeron_services', JSON.stringify(services));
            renderServices();
            renderAdminServices();
            document.getElementById('new-srv-name').value = '';
            document.getElementById('new-srv-price').value = '';
        }
    }

    function renderServices() {
        const container = document.getElementById('services-list');
        container.innerHTML = services.map(s => `
            <div class="service-card">
                <span>${s.name}</span>
                <b style="color:var(--primary)">${s.price.toFixed(2)} AZN</b>
            </div>
        `).join('');
    }

    function renderAdminServices() {
        const container = document.getElementById('admin-services-list');
        container.innerHTML = services.map((s, idx) => `
            <div style="display:flex; justify-content:space-between; background:#111; padding:10px; margin:5px 0; border-radius:8px; font-size:13px;">
                <span>${s.name} (${s.price} AZN)</span>
                <span onclick="deleteSrv(${idx})" style="color:var(--red); cursor:pointer;">Sil</span>
            </div>
        `).join('');
    }

    function deleteSrv(idx) {
        services.splice(idx, 1);
        localStorage.setItem('axeron_services', JSON.stringify(services));
        renderAdminServices();
        renderServices();
    }

    function closeAdmin() {
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('user-panel').classList.remove('hidden');
    }
</script>

</body>
</html>
