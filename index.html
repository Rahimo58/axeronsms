<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXERON SMS PRO | Admin Dashboard v5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #00f2ff; --p-glow: rgba(0, 242, 255, 0.4);
            --bg: #020408; --card: #0a0e14; --border: #16212e;
            --text: #ffffff; --error: #ff0055; --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* ELAN ZOLAĞI - DONMAYAN */
        #admin-ticker {
            background: linear-gradient(90deg, #ff0000, #990000);
            height: 38px; display: none; align-items: center; position: sticky; top: 0; z-index: 9999;
            overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .ticker-move {
            display: inline-block; white-space: nowrap; padding-left: 100%;
            animation: tickerSlide 15s linear infinite; font-weight: 700; text-transform: uppercase;
            will-change: transform;
        }
        @keyframes tickerSlide { from { transform: translate3d(0,0,0); } to { transform: translate3d(-100%,0,0); } }

        /* APP WRAPPER */
        .app-wrapper { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); position: relative; }
        .hidden { display: none !important; }

        /* AUTH & FORMS */
        .auth-screen { padding: 40px 25px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .logo-text { font-family: 'Orbitron'; font-size: 45px; font-weight: 900; color: var(--p); text-shadow: 0 0 15px var(--p); margin-bottom: 40px; }
        
        input {
            width: 100%; padding: 16px; background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; color: #fff; margin-bottom: 15px; font-size: 16px;
        }
        input:focus { border-color: var(--p); box-shadow: 0 0 10px var(--p-glow); outline: none; }

        .btn-main {
            width: 100%; padding: 16px; background: var(--p); color: #000; border: none; border-radius: 12px;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s;
        }

        /* DASHBOARD ELEMENTS */
        header { padding: 18px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 2px solid var(--p); }
        .balance-card {
            margin: 20px; padding: 30px; background: linear-gradient(135deg, #0d1117, #001d20);
            border-radius: 20px; border: 1px solid var(--p); text-align: center;
        }
        .bal-val { font-family: 'Orbitron'; font-size: 35px; color: var(--p); }

        /* NAVIGATION */
        .nav-dock {
            position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #05070a;
            display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { color: #4b5563; text-align: center; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--p); }

        /* ADMIN PANEL UI */
        .admin-page { padding: 20px; padding-bottom: 100px; }
        .admin-section { background: #0d0d0d; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .admin-section h3 { color: var(--p); font-family: 'Orbitron'; font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        /* BALANS ARTIR MODAL */
        .payment-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center; z-index: 5000;
        }
        .p-content { background: var(--card); width: 85%; max-width: 350px; padding: 25px; border-radius: 20px; border: 1px solid var(--p); text-align: center; }
    </style>
</head>
<body>

<div id="admin-ticker">
    <div class="ticker-move" id="ticker-text">Xoş gəlmisiniz!</div>
</div>

<div class="app-wrapper">
    <div id="auth-layer" class="auth-screen">
        <div class="logo-text">AXERON</div>
        <div id="login-form">
            <input type="text" id="log-u" placeholder="İstifadəçi adı">
            <input type="password" id="log-p" placeholder="Şifrə">
            <button class="btn-main" onclick="sys.login()">DAXİL OL</button>
            <p style="margin-top:20px; color:#6b7280;" onclick="sys.toggleAuth(false)">Qeydiyyatdan keç</p>
        </div>
        <div id="reg-form" class="hidden">
            <input type="text" id="reg-u" placeholder="İstifadəçi adı">
            <input type="email" id="reg-e" placeholder="E-poçt ünvanı">
            <input type="password" id="reg-p" placeholder="Şifrə">
            <button class="btn-main" onclick="sys.register()">TAMAMLA</button>
            <p style="margin-top:20px; color:#6b7280;" onclick="sys.toggleAuth(true)">Geri qayıt</p>
        </div>
    </div>

    <div id="main-layer" class="hidden">
        <header>
            <i class="fas fa-bars" style="color:var(--p);"></i>
            <div style="font-family:'Orbitron'; font-weight:900;">AXERON</div>
            <i class="fas fa-user-shield" onclick="sys.openAdmin()" style="color:var(--p);"></i>
        </header>

        <div id="home-tab">
            <div class="balance-card">
                <div style="font-size:12px; opacity:0.6; letter-spacing:2px;">BALANS</div>
                <div class="bal-val"><span id="u-bal">0.00</span> AZN</div>
                <div id="u-id" style="font-size:12px; margin-top:5px; color:var(--p);">ID: #----</div>
            </div>

            <div style="padding: 0 20px;">
                <button class="btn-main" onclick="sys.showPayment()" style="background:var(--success);">BALANS ARTIR</button>
            </div>

            <div id="services-area" style="padding: 20px;">
                <h4 style="color:var(--p); margin-bottom:15px;">Xidmətlər</h4>
                </div>
        </div>

        <div id="admin-tab" class="hidden admin-page">
            <h2 style="font-family:'Orbitron'; margin-bottom:20px; color:var(--error);">ADMİN PANEL</h2>
            
            <div class="admin-section">
                <h3>📢 ELAN DƏYİŞDİR</h3>
                <input type="text" id="adm-msg" placeholder="Yeni elan yazısı...">
                <button class="btn-main" onclick="sys.setTicker()">YAYINLA</button>
            </div>

            <div class="admin-section">
                <h3>💳 KART MƏLUMATLARI</h3>
                <input type="text" id="adm-card-no" placeholder="Kart nömrəsi">
                <input type="text" id="adm-card-name" placeholder="Kart sahibi (Ad Soyad)">
                <button class="btn-main" onclick="sys.saveCard()" style="background:var(--p);">YADDA SAXLA</button>
            </div>

            <div class="admin-section">
                <h3>💰 ID İLƏ BALANS YÜKLƏ</h3>
                <input type="text" id="adm-target-id" placeholder="İstifadəçi ID-si">
                <input type="number" id="adm-amt" placeholder="Məbləğ (AZN)">
                <button class="btn-main" onclick="sys.addBalance()" style="background:var(--success); color:black;">BALANSI ARTIR</button>
            </div>

            <button class="btn-main" onclick="sys.switchTab('home')" style="background:#333; color:white;">GERİ QAYIT</button>
        </div>

        <nav class="nav-dock">
            <div class="nav-item active" onclick="sys.switchTab('home')"><i class="fas fa-home"></i><br>ANA SƏHİFƏ</div>
            <div class="nav-item" onclick="sys.showPayment()"><i class="fas fa-wallet"></i><br>BALANS</div>
            <div class="nav-item" onclick="sys.logout()" style="color:var(--error);"><i class="fas fa-power-off"></i><br>ÇIXIŞ</div>
        </nav>
    </div>

    <div id="pay-modal" class="payment-modal hidden">
        <div class="p-content">
            <h3 style="color:var(--p); margin-bottom:15px;">Balans Artır</h3>
            <p style="font-size:13px; margin-bottom:15px;">Ödənişi aşağıdakı karta edin və qəbzi adminə göndərin.</p>
            <div style="background:#111; padding:15px; border-radius:10px; border:1px dashed var(--p); margin-bottom:20px;">
                <div id="view-card-no" style="font-weight:bold; letter-spacing:2px; font-size:18px;">---- ---- ---- ----</div>
                <div id="view-card-name" style="font-size:12px; margin-top:5px; opacity:0.7;">AD SOYAD</div>
            </div>
            <button class="btn-main" onclick="sys.closePayment()">BAĞLA</button>
        </div>
    </div>
</div>

<script>
    const sys = {
        currentUser: null,
        adminPass: "Rahim058",

        init() {
            const session = localStorage.getItem('ax_session');
            if (session) {
                this.currentUser = JSON.parse(session);
                this.showMain();
            }
        },

        register() {
            const u = document.getElementById('reg-u').value.trim();
            const e = document.getElementById('reg-e').value.trim();
            const p = document.getElementById('reg-p').value.trim();
            if(!u || !e || !p) return alert("Boş xana buraxma!");
            
            let db = JSON.parse(localStorage.getItem('ax_db')) || [];
            if(db.find(x => x.u === u)) return alert("Bu ad artıq alınıb!");

            const user = { u, e, p, bal: 0, id: Math.floor(100000 + Math.random() * 899999) };
            db.push(user);
            localStorage.setItem('ax_db', JSON.stringify(db));
            alert("Uğurla qeydiyyatdan keçdiniz!");
            this.toggleAuth(true);
        },

        login() {
            const u = document.getElementById('log-u').value.trim();
            const p = document.getElementById('log-p').value.trim();
            let db = JSON.parse(localStorage.getItem('ax_db')) || [];
            let user = db.find(x => x.u === u && x.p === p);

            if(user) {
                this.currentUser = user;
                localStorage.setItem('ax_session', JSON.stringify(user));
                this.showMain();
            } else alert("Məlumatlar səhvdir!");
        },

        showMain() {
            document.getElementById('auth-layer').classList.add('hidden');
            document.getElementById('main-layer').classList.remove('hidden');
            this.updateUI();
        },

        updateUI() {
            document.getElementById('u-bal').innerText = this.currentUser.bal.toFixed(2);
            document.getElementById('u-id').innerText = "ID: #" + this.currentUser.id;
        },

        // --- ADMİN FUNKSİYALARI ---
        openAdmin() {
            if(prompt("Admin şifrəsi:") === this.adminPass) {
                this.switchTab('admin');
            } else alert("Giriş qadağandır!");
        },

        setTicker() {
            const msg = document.getElementById('adm-msg').value;
            if(msg) {
                document.getElementById('admin-ticker').style.display = 'flex';
                document.getElementById('ticker-text').innerText = msg;
                alert("Elan yeniləndi!");
            }
        },

        saveCard() {
            const no = document.getElementById('adm-card-no').value;
            const name = document.getElementById('adm-card-name').value;
            localStorage.setItem('ax_card', JSON.stringify({no, name}));
            alert("Kart məlumatları yeniləndi!");
        },

        addBalance() {
            const tid = document.getElementById('adm-target-id').value;
            const amt = parseFloat(document.getElementById('adm-amt').value);
            let db = JSON.parse(localStorage.getItem('ax_db'));
            let idx = db.findIndex(x => x.id == tid);

            if(idx !== -1) {
                db[idx].bal += amt;
                localStorage.setItem('ax_db', JSON.stringify(db));
                if(this.currentUser.id == tid) {
                    this.currentUser.bal += amt;
                    localStorage.setItem('ax_session', JSON.stringify(this.currentUser));
                    this.updateUI();
                }
                alert("Balans yükləndi!");
            } else alert("İstifadəçi tapılmadı!");
        },

        // --- İSTİFADƏÇİ ÖDƏNİŞ ---
        showPayment() {
            const card = JSON.parse(localStorage.getItem('ax_card')) || {no: "Təyin edilməyib", name: "---"};
            document.getElementById('view-card-no').innerText = card.no;
            document.getElementById('view-card-name').innerText = card.name;
            document.getElementById('pay-modal').classList.remove('hidden');
        },

        closePayment() { document.getElementById('pay-modal').classList.add('hidden'); },

        switchTab(tab) {
            document.getElementById('home-tab').classList.toggle('hidden', tab !== 'home');
            document.getElementById('admin-tab').classList.toggle('hidden', tab !== 'admin');
        },

        toggleAuth(isLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('reg-form').classList.toggle('hidden', isLogin);
        },

        logout() { localStorage.removeItem('ax_session'); location.reload(); }
    };

    window.onload = () => sys.init();
</script>
</body>
</html>
