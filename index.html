<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axeron SMS | API Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #05070a;
            --card: #0d1117;
            --border: #1e293b;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        .hidden { display: none !important; }

        /* HEADER */
        header { 
            padding: 18px 20px; background: var(--card); border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center; box-shadow: var(--neon-glow);
        }
        .logo { font-family: 'Orbitron'; color: var(--primary); font-size: 22px; text-shadow: var(--neon-glow); font-weight: 800; }

        /* SIDE MENU (Şəkildəki Tam Versiya) */
        .side-menu {
            position: fixed; left: -100%; top: 0; width: 85%; max-width: 320px; height: 100%; 
            background: #05070a; z-index: 3000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 25px;
            border-right: 3px solid var(--primary); box-shadow: 20px 0 50px rgba(0,0,0,0.8);
        }
        .side-menu.active { left: 0; }
        .side-menu h2 { font-family: 'Orbitron'; color: var(--primary); font-size: 28px; margin-bottom: 5px; text-shadow: var(--neon-glow); }
        .side-id { color: var(--primary); font-size: 14px; margin-bottom: 35px; font-weight: bold; letter-spacing: 1px; }
        
        .menu-item { padding: 16px 0; display: flex; align-items: center; gap: 18px; cursor: pointer; color: #fff; font-size: 17px; border-bottom: 1px solid rgba(0,242,255,0.1); transition: 0.2s; }
        .menu-item i { color: var(--primary); font-size: 20px; width: 30px; text-align: center; }
        .menu-item:active { background: rgba(0,242,255,0.05); padding-left: 10px; }
        .menu-item.logout { color: #ff4d4d; margin-top: 30px; border: none; }
        .menu-item.logout i { color: #ff4d4d; }

        /* NEON BALANCE */
        .balance-card { margin: 20px; padding: 25px; border-radius: 18px; background: rgba(13, 17, 23, 0.8); border: 1px solid var(--primary); box-shadow: var(--neon-glow); text-align: center; }
        .money { font-size: 42px; font-family: 'Orbitron'; color: #fff; margin: 12px 0; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* SERVICES (API DİNAMİK) */
        .srv-container { padding: 0 20px 100px 20px; }
        .srv-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; 
            padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 4px solid var(--primary);
        }
        .srv-name { font-weight: 700; font-size: 16px; color: #fff; }
        .srv-price { font-family: 'Orbitron'; color: var(--primary); font-weight: 800; font-size: 15px; }

        /* OVERLAY */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2500; display: none; backdrop-filter: blur(4px); }
        
        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #0d1117; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--primary); box-shadow: 0 -5px 15px rgba(0,242,255,0.1); }
        .nav-t { color: #888; font-size: 12px; text-align: center; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-t.active { color: var(--primary); text-shadow: var(--neon-glow); }
        .nav-t i { font-size: 20px; margin-bottom: 5px; }

        /* AUTH BOX */
        .auth-box { padding: 60px 30px; text-align: center; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 10px; background: #0d1117; border: 1px solid var(--border); color: #fff; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: var(--neon-glow); outline: none; }
        .btn-p { width: 100%; padding: 16px; border-radius: 10px; border: none; background: var(--primary); color: #000; font-weight: bold; font-family: 'Orbitron'; font-size: 16px; cursor: pointer; box-shadow: var(--neon-glow); }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="container">
    <div class="side-menu" id="side-menu">
        <h2>AXERON</h2>
        <div class="side-id" id="side-id">ID: #AX8820</div>
        
        <div class="menu-item" onclick="showP('home')"><i class="fas fa-home"></i> Ana Səhifə</div>
        <div class="menu-item" onclick="showP('faq')"><i class="fas fa-question-circle"></i> Tez-tez verilən suallar</div>
        <div class="menu-item" onclick="showP('about')"><i class="fas fa-info-circle"></i> Haqqımızda</div>
        <div class="menu-item" onclick="showP('ref')"><i class="fas fa-users"></i> Referal sistemi</div>
        <div class="menu-item" onclick="window.open('https://t.me/AxeronAndMee')"><i class="fab fa-telegram-plane"></i> Canlı Dəstək</div>
        <div class="menu-item" onclick="adminLogin()"><i class="fas fa-user-shield"></i> Admin Panel</div>
        
        <div class="menu-item logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ÇIXIŞ</div>
    </div>

    <div id="page-auth" class="auth-box">
        <h1 style="font-family:'Orbitron'; color:var(--primary); font-size:45px; text-shadow: var(--neon-glow); margin-bottom:40px;">AXERON</h1>
        <input type="text" id="l-user" placeholder="İstifadəçi adı">
        <input type="password" id="l-pass" placeholder="Şifrə">
        <button class="btn-p" onclick="login()">GİRİŞ ET</button>
    </div>

    <div id="page-main" class="hidden">
        <header>
            <i class="fas fa-bars" onclick="openMenu()" style="font-size:24px; cursor:pointer; color:var(--primary);"></i>
            <span class="logo">AXERON</span>
            <i class="fas fa-headset" onclick="window.open('https://t.me/AxeronAndMee')" style="color:var(--primary);"></i>
        </header>

        <div id="tab-home">
            <div class="balance-card">
                <span style="color:var(--primary); font-weight:bold; letter-spacing:1px;">CİBİNİZ</span>
                <div class="money"><span id="u-bal">0.00</span> <small style="font-size:16px;">AZN</small></div>
                <button onclick="showP('funds')" style="background:var(--primary); border:none; color:#000; padding:8px 20px; border-radius:6px; cursor:pointer; font-weight:bold; font-family:'Orbitron';">BALANS ARTIR</button>
            </div>

            <div style="padding:10px 22px; font-weight:bold; color:var(--primary); font-family:'Orbitron'; letter-spacing:1px;">AKTİV XİDMƏTLƏR</div>
            <div id="service-list" class="srv-container">
                </div>
        </div>

        <div id="tab-funds" class="hidden" style="padding:25px;">
            <h2 style="color:var(--primary); font-family:'Orbitron';">ÖDƏNİŞ</h2>
            <div style="background:var(--card); border:1px solid var(--primary); padding:20px; border-radius:15px; box-shadow: var(--neon-glow);">
                <p>Kart: <b>4127 0000 0000 0000</b></p>
                <p>Sahib: <b>RAHIM O.</b></p>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-t active" onclick="showP('home', this)"><i class="fas fa-bolt"></i><br>PANEL</div>
            <div class="nav-t" onclick="showP('orders', this)"><i class="fas fa-history"></i><br>TARİXÇƏ</div>
            <div class="nav-t" onclick="showP('funds', this)"><i class="fas fa-plus-circle"></i><br>YÜKLƏ</div>
        </nav>
    </div>
</div>

<script>
    let user = JSON.parse(localStorage.getItem('ax_ses'));
    
    // DİQQƏT: Qiymətləri burdan özün təyin eləmirsən.
    // API-ni qoşanda bu "services" massivi API-dən gələn qiymətlərlə dolacaq.
    const services = [
        {name: "Telegram SMS", price: 0.25}, // API-də 0.25-dirsə, burda da o olacaq
        {name: "WhatsApp SMS", price: 0.45},
        {name: "Instagram Fake", price: 0.35},
        {name: "TikTok Global", price: 0.15}
    ];

    window.onload = () => { if(user) start(); };

    function login() {
        let u = document.getElementById('l-user').value;
        let p = document.getElementById('l-pass').value;
        if(u && p) {
            user = {user: u, bal: 0.00, id: "AX" + Math.floor(1000+Math.random()*9000)};
            localStorage.setItem('ax_ses', JSON.stringify(user));
            start();
        }
    }

    function start() {
        document.getElementById('page-auth').classList.add('hidden');
        document.getElementById('page-main').classList.remove('hidden');
        document.getElementById('u-bal').innerText = user.bal.toFixed(2);
        document.getElementById('side-id').innerText = "ID: #" + user.id;
        renderSrv();
    }

    function renderSrv() {
        let list = document.getElementById('service-list');
        list.innerHTML = "";
        services.forEach(s => {
            // Qiymət birbaşa massivdən (API məntiqi) götürülür
            list.innerHTML += `
                <div class="srv-card" onclick="buy('${s.name}', ${s.price})">
                    <span class="srv-name">${s.name}</span>
                    <span class="srv-price">${s.price.toFixed(2)} AZN</span>
                </div>
            `;
        });
    }

    function buy(n, p) {
        if(user.bal < p) {
            alert("XƏTA: API Sistemində balans bitib!\nLütfən adminlə əlaqə saxlayın.");
            return;
        }
        confirm(n + " xidməti " + p + " AZN qiymətinə alınsın?");
    }

    function showP(p, el) {
        ['home', 'funds'].forEach(t => {
            let target = document.getElementById('tab-' + t);
            if(target) target.classList.add('hidden');
        });
        let activeTab = document.getElementById('tab-' + p);
        if(activeTab) activeTab.classList.remove('hidden');

        if(el) {
            document.querySelectorAll('.nav-t').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        closeMenu();
    }

    function adminLogin() {
        let p = prompt("Admin Şifrəsi:");
        if(p === "Rahim058") alert("Giriş uğurludur!");
        else alert("Şifrə yanlışdır!");
    }

    function openMenu() { document.getElementById('side-menu').classList.add('active'); document.getElementById('overlay').style.display='block'; }
    function closeMenu() { document.getElementById('side-menu').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
    function logout() { localStorage.removeItem('ax_ses'); location.reload(); }
</script>

</body>
</html>
