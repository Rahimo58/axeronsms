<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axeron SMS | Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --bg: #05070a; --card: #0d1117; --border: #1e293b; --text: #e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--bg); border: 1px solid var(--border); position: relative; }
        .hidden { display: none !important; }

        /* UI Elements */
        header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; color: var(--primary); font-size: 18px; }
        .balance-card { margin: 15px; padding: 20px; border-radius: 20px; background: linear-gradient(135deg, #0f172a, #020617); border: 1px solid var(--border); }
        .money { font-size: 35px; font-family: 'Orbitron'; margin: 10px 0; color: #fff; }
        
        .srv-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin: 0 15px 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .c-btn { padding: 8px 15px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: #fff; white-space: nowrap; }
        .c-btn.active { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,242,255,0.3); }

        /* Side Menu */
        .side-menu { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: var(--bg); z-index: 2000; transition: 0.4s; padding: 30px 20px; border-right: 2px solid var(--primary); }
        .side-menu.active { left: 0; }
        .menu-item { padding: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; color: #94a3b8; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #0a0d14; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-t { color: #555; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-t.active { color: var(--primary); }

        /* Auth */
        .auth-scr { padding: 40px 25px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; background: #000; border: 1px solid var(--border); color: #fff; }
        .btn-p { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: #fff; font-weight: bold; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
        .hist-item { background: var(--card); padding: 10px; border-radius: 10px; border-bottom: 1px solid var(--primary); margin-bottom: 8px; font-size: 14px; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="container">
    <div class="side-menu" id="side-menu">
        <h2 style="font-family:'Orbitron'; color:var(--primary)">AXERON</h2>
        <div id="side-id" style="color:var(--primary); margin-bottom:20px;">ID: #----</div>
        <div class="menu-item" onclick="showP('home')"><i class="fas fa-home"></i> Ana Səhifə</div>
        <div class="menu-item" onclick="showP('orders')"><i class="fas fa-history"></i> Sifarişlərim</div>
        <div class="menu-item" onclick="showP('funds')"><i class="fas fa-wallet"></i> Balans Artır</div>
        <div class="menu-item" style="color:red; margin-top:30px;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Çıxış</div>
    </div>

    <div id="page-auth" class="auth-scr">
        <h1 style="font-family:'Orbitron'; color:var(--primary)">AXERON</h1>
        <div id="box-login">
            <input type="text" id="l-user" placeholder="İstifadəçi adı">
            <input type="password" id="l-pass" placeholder="Şifrə">
            <button class="btn-p" onclick="login()">DAXİL OL</button>
            <p onclick="toggleA(false)" style="margin-top:15px; font-size:12px;">Hesab yoxdur? <span style="color:var(--primary)">Qeydiyyat</span></p>
        </div>
        <div id="box-reg" class="hidden">
            <input type="text" id="r-user" placeholder="İstifadəçi adı">
            <input type="email" id="r-email" placeholder="E-poçt">
            <input type="password" id="r-pass" placeholder="Şifrə">
            <button class="btn-p" onclick="register()">QEYDİYYAT</button>
            <p onclick="toggleA(true)" style="margin-top:15px; font-size:12px;">Geri qayıt</p>
        </div>
    </div>

    <div id="page-main" class="hidden">
        <header>
            <i class="fas fa-bars" onclick="openMenu()" style="color:var(--primary); font-size:20px;"></i>
            <span class="logo">AXERON SMS</span>
            <i class="fas fa-headset" onclick="window.open('https://t.me/AxeronAndMee')"></i>
        </header>

        <div id="tab-home">
            <div class="balance-card">
                <span id="main-id" style="font-size:12px; color:var(--primary);">ID: #----</span>
                <div class="money"><span id="u-bal">0.00</span> <small style="font-size:14px;">AZN</small></div>
            </div>
            <div style="padding:0 15px; display:flex; gap:10px; margin-bottom:15px; overflow-x:auto;">
                <div onclick="loadS('ru', this)" class="c-btn active">🇷🇺 Rusiya</div>
                <div onclick="loadS('tr', this)" class="c-btn">🇹🇷 Türkiyə</div>
            </div>
            <div id="srv-list"></div>
        </div>

        <div id="tab-orders" class="hidden" style="padding:20px;">
            <h2 style="color:var(--primary)">Sifarişlərim</h2>
            <div id="order-history"></div>
        </div>

        <div id="tab-funds" class="hidden" style="padding:20px;">
            <h2>Balans Artır</h2>
            <div style="background:var(--card); padding:15px; border-radius:10px; border:1px solid var(--primary)">
                Kart: 4127 0000 0000 0000<br>Sahib: RAHIM O.
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-t active" onclick="showP('home', this)"><i class="fas fa-home"></i><br>Ev</div>
            <div class="nav-t" onclick="showP('orders', this)"><i class="fas fa-history"></i><br>Sifariş</div>
            <div class="nav-t" onclick="showP('funds', this)"><i class="fas fa-wallet"></i><br>Yüklə</div>
        </nav>
    </div>
</div>

<script>
    // Köhnə xarab yaddaşı təmizləyirik
    if(localStorage.getItem('ax_ses') === "[object Object]") { localStorage.removeItem('ax_ses'); }

    let user = null;
    try { user = JSON.parse(localStorage.getItem('ax_ses')); } catch(e) { user = null; }

    const srvs = {
        'ru': [{n:'Telegram', p:0.25}, {n:'WhatsApp', p:0.45}],
        'tr': [{n:'Instagram', p:0.35}, {n:'TikTok', p:0.25}]
    };

    window.onload = () => { if(user) start(); };

    function toggleA(isL) {
        document.getElementById('box-login').classList.toggle('hidden', !isL);
        document.getElementById('box-reg').classList.toggle('hidden', isL);
    }

    function register() {
        let u = document.getElementById('r-user').value;
        let e = document.getElementById('r-email').value;
        let p = document.getElementById('r-pass').value;
        if(!u || !e.includes('@')) return alert("Məlumatları düzgün doldurun!");
        let id = "AX" + Math.floor(1000 + Math.random() * 9000);
        let data = {user: u, email: e, pass: p, bal: 0.00, id: id, orders: []};
        localStorage.setItem('ax_db_'+u, JSON.stringify(data));
        alert("Qeydiyyat tamamlandı!");
        toggleA(true);
    }

    function login() {
        let u = document.getElementById('l-user').value;
        let p = document.getElementById('l-pass').value;
        let db = JSON.parse(localStorage.getItem('ax_db_'+u));
        if(db && db.pass === p) {
            user = db;
            localStorage.setItem('ax_ses', JSON.stringify(user));
            start();
        } else alert("İstifadəçi tapılmadı!");
    }

    function start() {
        document.getElementById('page-auth').classList.add('hidden');
        document.getElementById('page-main').classList.remove('hidden');
        document.getElementById('main-id').innerText = "ID: #" + user.id;
        document.getElementById('side-id').innerText = "ID: #" + user.id;
        document.getElementById('u-bal').innerText = user.bal.toFixed(2);
        loadS('ru', document.querySelector('.c-btn'));
        renderOrders();
    }

    function loadS(c, el) {
        let l = document.getElementById('srv-list'); l.innerHTML = "";
        srvs[c].forEach(s => {
            l.innerHTML += `<div class="srv-card" onclick="buy('${s.n}', ${s.p})">
                <b>${s.n}</b> <b style="color:var(--primary)">${s.p.toFixed(2)} AZN</b>
            </div>`;
        });
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function buy(n, p) {
        if(user.bal < p) return alert("Balans yetərsiz!");
        let api_bal = 0.00; // API yoxlanışı
        if(api_bal <= 0) return alert("XƏTA: API Balansı bitib!");
        
        if(confirm(n + " alınsın?")) {
            user.bal -= p;
            user.orders.unshift({service: n, price: p, date: new Date().toLocaleString(), status: 'Gözlənilir'});
            save(); start();
        }
    }

    function renderOrders() {
        let div = document.getElementById('order-history');
        div.innerHTML = user.orders.length ? "" : "Sifariş yoxdur.";
        user.orders.forEach(o => {
            div.innerHTML += `<div class="hist-item"><b>${o.service}</b> - ${o.price} AZN<br><small>${o.date}</small></div>`;
        });
    }

    function showP(p, el) {
        ['home', 'orders', 'funds'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
        document.getElementById('tab-'+p).classList.remove('hidden');
        if(el) {
            document.querySelectorAll('.nav-t').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        closeMenu();
    }

    function openMenu() { document.getElementById('side-menu').classList.add('active'); document.getElementById('overlay').style.display='block'; }
    function closeMenu() { document.getElementById('side-menu').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
    function save() { localStorage.setItem('ax_ses', JSON.stringify(user)); localStorage.setItem('ax_db_'+user.user, JSON.stringify(user)); }
    function logout() { localStorage.removeItem('ax_ses'); location.reload(); }
</script>
</body>
</html>
