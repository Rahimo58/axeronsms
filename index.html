<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axeron Prime | Digital Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --main: #00f2ff;
            --second: #7000ff;
            --bg: #06070d;
            --glass: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(15, 18, 31, 0.8);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow-x: hidden; padding-bottom: 80px; }

        /* Dinamik Fon Animasiyası */
        body::before {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, #1a1b3a 0%, transparent 70%);
            z-index: -1; animation: moveBg 15s infinite alternate;
        }
        @keyframes moveBg { from { transform: translate(0,0); } to { transform: translate(10%, 10%); } }

        /* SCANNABLE HEADER */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; backdrop-filter: blur(10px); background: rgba(6,7,13,0.7); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; background: linear-gradient(to right, var(--main), var(--second)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-mini { display: flex; align-items: center; gap: 10px; background: var(--glass); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--glass); }

        /* WALLET CARD */
        .wallet-card { margin: 20px; padding: 25px; border-radius: 30px; background: linear-gradient(135deg, var(--second), #400099); position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(112, 0, 255, 0.3); }
        .wallet-card::after { content: ""; position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        .wallet-label { font-size: 12px; opacity: 0.8; letter-spacing: 1px; }
        .wallet-balance { font-size: 32px; font-weight: 700; margin: 5px 0; font-family: 'Orbitron'; }
        
        /* CATEGORIES */
        .cat-scroll { display: flex; overflow-x: auto; padding: 0 20px; gap: 15px; scrollbar-width: none; }
        .cat-chip { padding: 10px 20px; background: var(--glass); border-radius: 15px; border: 1px solid var(--glass); white-space: nowrap; font-size: 13px; transition: 0.3s; }
        .cat-chip.active { background: var(--main); color: #000; font-weight: 600; box-shadow: 0 0 15px var(--main); }

        /* PRODUCT GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .item { background: var(--card-bg); border-radius: 25px; padding: 10px; border: 1px solid var(--glass); transition: 0.4s; position: relative; }
        .item:hover { transform: translateY(-5px); border-color: var(--main); }
        .item img { width: 100%; height: 120px; object-fit: cover; border-radius: 20px; margin-bottom: 10px; }
        .item-title { font-size: 13px; font-weight: 600; margin-bottom: 5px; height: 38px; overflow: hidden; }
        .item-price { color: var(--main); font-weight: 700; font-size: 16px; }
        .buy-btn { position: absolute; bottom: 10px; right: 10px; width: 35px; height: 35px; background: var(--second); border-radius: 12px; display: flex; align-items: center; justify-content: center; border: none; color: white; cursor: pointer; }

        /* NAV MENU */
        nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(20, 20, 30, 0.9); backdrop-filter: blur(20px); height: 65px; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid var(--glass); z-index: 1000; }
        .n-btn { color: #555; text-decoration: none; font-size: 22px; transition: 0.3s; position: relative; cursor: pointer; }
        .n-btn.active { color: var(--main); }
        .n-btn.active::after { content: ""; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: var(--main); border-radius: 50%; box-shadow: 0 0 10px var(--main); }

        /* FULL SCREENS */
        .page { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 2000; padding: 25px; overflow-y: auto; display: none; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .close-page { font-size: 24px; color: var(--main); }

        /* INPUTS */
        input { width: 100%; padding: 15px; background: var(--glass); border: 1px solid var(--glass); border-radius: 15px; color: white; margin-bottom: 15px; font-size: 16px; }
        .main-btn { width: 100%; padding: 16px; background: linear-gradient(to right, var(--main), var(--second)); border: none; border-radius: 15px; color: #000; font-weight: 700; font-size: 16px; cursor: pointer; text-transform: uppercase; }

        /* ADMIN PANEL LIST */
        .adm-card { background: var(--glass); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* TOAST */
        #alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: white; color: black; padding: 12px 25px; border-radius: 50px; font-weight: 600; transition: 0.5s; z-index: 9999; white-space: nowrap; }
    </style>
</head>
<body>

<div id="alert">Sifarişiniz qəbul edildi!</div>

<header>
    <div class="logo">AXERON PRIME</div>
    <div class="user-mini" onclick="app.showPage('profile')">
        <i class="fas fa-wallet" style="color:var(--main)"></i>
        <span id="miniBal">0.00</span>
    </div>
</header>

<main id="home">
    <div class="wallet-card">
        <div class="wallet-label">ÜMUMİ BALANS</div>
        <div class="wallet-balance" id="mainBal">0.00 AZN</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
            <span style="font-size:12px; opacity:0.7;" id="uID">ID: 00000</span>
            <span style="background:rgba(255,255,255,0.2); padding:5px 12px; border-radius:10px; font-size:11px;">VIP STATUS</span>
        </div>
    </div>

    <div class="cat-scroll">
        <div class="cat-chip active">Hamısı</div>
        <div class="cat-chip">Netflix</div>
        <div class="cat-chip">Oyun</div>
        <div class="cat-chip">Hədiyyə Kartı</div>
    </div>

    <div class="grid" id="productGrid">
        </div>
</main>

<nav>
    <div class="n-btn active" onclick="app.showPage('home')"><i class="fas fa-home"></i></div>
    <div class="n-btn" onclick="app.showPage('search')"><i class="fas fa-search"></i></div>
    <div class="n-btn" onclick="app.showPage('orders')"><i class="fas fa-shopping-bag"></i></div>
    <div class="n-btn" onclick="app.showPage('profile')"><i class="fas fa-user"></i></div>
</nav>

<div id="page-profile" class="page">
    <div class="page-header">
        <h2>Profil</h2>
        <i class="fas fa-cog" onclick="app.adminEntry()"></i>
    </div>
    <div style="text-align:center; margin-bottom:30px;">
        <div style="width:100px; height:100px; background:var(--glass); border-radius:50%; margin: 0 auto 15px; display:flex; align-items:center; justify-content:center; border: 2px solid var(--main);">
            <i class="fas fa-user-astronaut" style="font-size:40px; color:var(--main);"></i>
        </div>
        <h3 id="pName">İstifadəçi</h3>
        <p style="opacity:0.5; font-size:13px;" id="pID">ID: 00000</p>
    </div>
    
    <div class="wallet-card" style="margin:0 0 20px 0; background: var(--glass); border: 1px solid var(--glass);">
        <p style="font-size:12px;">Balans Yükləmə:</p>
        <p style="font-size:14px; margin-top:5px;">M10 / MilliÖn: <b>+994 50 123 45 67</b></p>
    </div>

    <button class="main-btn" onclick="app.logout()" style="background: #333; color: white;">ÇIXIŞ ET</button>
</div>

<div id="page-admin" class="page">
    <div class="page-header">
        <h2>Admin Panel</h2>
        <i class="fas fa-times close-page" onclick="app.showPage('home')"></i>
    </div>

    <div style="background:var(--glass); padding:20px; border-radius:20px; margin-bottom:20px;">
        <h4>Yeni Məhsul Əlavə Et</h4>
        <input type="text" id="admTitle" placeholder="Məhsul adı">
        <input type="number" id="admPrice" placeholder="Qiymət">
        <input type="text" id="admImg" placeholder="Şəkil URL (Mütləqdir)">
        <button class="main-btn" onclick="app.admAdd()">MAĞAZAYA ƏLAVƏ ET</button>
    </div>

    <div style="background:var(--glass); padding:20px; border-radius:20px;">
        <h4>Balans Manipulyasiyası</h4>
        <input type="text" id="admUID" placeholder="İstifadəçi ID-si">
        <input type="number" id="admBal" placeholder="Məbləğ">
        <button class="main-btn" onclick="app.admGiveMoney()" style="background:var(--main);">BALANS GÖNDƏR</button>
    </div>

    <h4 style="margin:20px 0 10px;">Sistemdəki Məhsullar</h4>
    <div id="admList"></div>
</div>

<div id="page-auth" class="page" style="display:flex; flex-direction:column; justify-content:center;">
    <h1 class="logo" style="font-size:40px; text-align:center; margin-bottom:50px;">AXERON</h1>
    <input type="text" id="authName" placeholder="Adınız">
    <input type="password" id="authPass" placeholder="Şifrə">
    <button class="main-btn" onclick="app.auth()">BAŞLA</button>
</div>

<script>
const app = {
    user: JSON.parse(localStorage.getItem('ax_user')) || null,
    products: JSON.parse(localStorage.getItem('ax_products')) || [
        {id: 1, t: "Netflix Premium (1 Aylıq)", p: 4.5, i: "https://www.edigitalagency.com.au/wp-content/uploads/Netflix-logo-red-black-png.png"},
        {id: 2, t: "Spotify Premium Family", p: 3.2, i: "https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg"}
    ],

    init() {
        if(!this.user) {
            this.showPage('auth');
        } else {
            this.updateUI();
            this.render();
        }
    },

    auth() {
        const n = document.getElementById('authName').value;
        const p = document.getElementById('authPass').value;
        if(n.length < 2) return;
        this.user = { id: Math.floor(10000 + Math.random()*90000), name: n, pass: p, bal: 0 };
        this.save();
        location.reload();
    },

    updateUI() {
        if(!this.user) return;
        document.getElementById('miniBal').innerText = this.user.bal.toFixed(2);
        document.getElementById('mainBal').innerText = this.user.bal.toFixed(2) + " AZN";
        document.getElementById('uID').innerText = "ID: " + this.user.id;
        document.getElementById('pID').innerText = "ID: " + this.user.id;
        document.getElementById('pName').innerText = this.user.name;
    },

    render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = this.products.map(p => `
            <div class="item">
                <img src="${p.i}">
                <div class="item-title">${p.t}</div>
                <div class="item-price">${p.p.toFixed(2)} AZN</div>
                <button class="buy-btn" onclick="app.buy(${p.id})"><i class="fas fa-shopping-cart"></i></button>
            </div>
        `).join('');
    },

    showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
        if(id === 'home') {
            document.querySelectorAll('.n-btn')[0].classList.add('active');
            return;
        }
        document.getElementById('page-' + id).style.display = 'block';
    },

    buy(id) {
        const p = this.products.find(x => x.id === id);
        if(this.user.bal < p.p) return this.toast("Balans kifayət deyil!");
        
        if(confirm(p.t + " almaq istəyirsiniz?")) {
            this.user.bal -= p.p;
            this.save();
            this.updateUI();
            this.toast("Uğurla alındı!");
        }
    },

    adminEntry() {
        const p = prompt("Admin şifrəsi:");
        if(p === "Rahim058") {
            this.showPage('admin');
            this.renderAdm();
        }
    },

    admAdd() {
        const t = document.getElementById('admTitle').value;
        const p = parseFloat(document.getElementById('admPrice').value);
        const i = document.getElementById('admImg').value;
        if(!t || !p || !i) return alert("Boş buraxma!");
        this.products.push({id: Date.now(), t, p, i});
        this.save();
        this.render();
        this.renderAdm();
        this.toast("Əlavə edildi!");
    },

    admGiveMoney() {
        const id = document.getElementById('admUID').value;
        const amt = parseFloat(document.getElementById('admBal').value);
        if(id == this.user.id) {
            this.user.bal += amt;
            this.save();
            this.updateUI();
            this.toast("Balans artırıldı!");
        }
    },

    renderAdm() {
        const list = document.getElementById('admList');
        list.innerHTML = this.products.map(p => `
            <div class="adm-card">
                <span>${p.t}</span>
                <i class="fas fa-trash" style="color:#ff4444" onclick="app.admDel(${p.id})"></i>
            </div>
        `).join('');
    },

    admDel(id) {
        this.products = this.products.filter(x => x.id !== id);
        this.save();
        this.render();
        this.renderAdm();
    },

    toast(msg) {
        const el = document.getElementById('alert');
        el.innerText = msg;
        el.style.transform = "translateX(-50%) translateY(0px)";
        setTimeout(() => el.style.transform = "translateX(-50%) translateY(-100px)", 2500);
    },

    save() {
        localStorage.setItem('ax_user', JSON.stringify(this.user));
        localStorage.setItem('ax_products', JSON.stringify(this.products));
    },

    logout() { localStorage.clear(); location.reload(); }
};

app.init();
</script>
</body>
</html>
