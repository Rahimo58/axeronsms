<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXERON | ONLY RESULTS</title>
    <style>
        :root {
            --bg: #050505;
            --neon: #ff0050;
            --gold: #facd05;
            --card: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }

        body {
            background: var(--bg);
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ÜST PANEL */
        .status-bar {
            width: 100%;
            max-width: 800px;
            padding: 15px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00ff41;
            font-size: 14px;
            font-weight: bold;
        }

        .dot {
            width: 10px; height: 10px; background: #00ff41; border-radius: 50%;
            box-shadow: 0 0 10px #00ff41; animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.2; } }

        /* NƏTİCƏLƏR SAHƏSİ */
        #results-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* SANDIQ KARTI */
        .chest-card {
            background: var(--card);
            border: 2px solid #222;
            border-radius: 15px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: 0.3s;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .chest-card:hover { border-color: var(--neon); box-shadow: 0 0 20px rgba(255, 0, 80, 0.2); }

        .info { display: flex; flex-direction: column; gap: 8px; }
        .user { color: #888; font-size: 14px; }
        .coins { color: var(--gold); font-size: 32px; font-weight: 900; }

        .link-btn {
            background: var(--neon);
            color: #fff;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 0, 80, 0.3);
        }

        .link-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 0, 80, 0.5); }

        .empty-text {
            text-align: center;
            margin-top: 100px;
            color: #222;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="status-bar">
    <div style="letter-spacing: 3px; font-weight: bold; color: var(--neon);">AXERON SNIPER</div>
    <div class="live-indicator">
        <div class="dot"></div> GLOBAL SCANNING ACTIVE
    </div>
</div>

<div id="results-container">
    <div class="empty-text" id="placeholder">Sandıq axtarılır...</div>
</div>

<script>
    const container = document.getElementById('results-container');
    const placeholder = document.getElementById('placeholder');

    // Bu funksiya yalnız sandıq tapılanda işə düşür
    function showChest(username, coinAmount) {
        if(placeholder) placeholder.remove();

        const card = document.createElement('div');
        card.className = 'chest-card';
        card.innerHTML = `
            <div class="info">
                <span class="user">@${username}</span>
                <span class="coins">💰 ${coinAmount} JETON</span>
            </div>
            <a href="https://www.tiktok.com/@${username}/live" target="_blank" class="link-btn">YAYIMA GİR</a>
        `;

        container.prepend(card);

        // Ekran dolmasın deyə köhnələri sil (limit: 10)
        if(container.children.length > 10) {
            container.removeChild(container.lastChild);
        }

        // Bildiriş səsi
        const audio = new Audio('https://www.soundjay.com/buttons/beep-07.mp3');
        audio.play().catch(() => {});
    }

    // --- GLOBAL SKANER SİMULYASİYASI ---
    // Real sistemdə bu hissə TikTok serverindən data çəkir
    setInterval(() => {
        // Təsadüfi olaraq sandıq tapılma anı (8 saniyədən bir)
        const chance = Math.random();
        if(chance > 0.90) { 
            const testUsers = ["Baku_Live", "Trend_User", "Gold_Hunter", "Pro_Player", "Sultan_01"];
            const randomUser = testUsers[Math.floor(Math.random() * testUsers.length)] + "_" + Math.floor(Math.random()*99);
            const randomCoins = Math.floor(Math.random() * 900) + 50;
            
            showChest(randomUser, randomCoins);
        }
    }, 3000); // Hər 3 saniyədən bir şansı yoxlayır
</script>

</body>
</html>
