<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axeron Prime V5 | Professional Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --primary: #00ddeb;
            --accent: #7d2ae8;
            --bg: #08090d;
            --card: #12141c;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 90px; }
        .hidden { display: none !important; }

        /* --- AUTH SYSTEM --- */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); width: 100%; max-width: 400px; padding: 30px; border-radius: 30px; border: 1px solid var(--glass); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .auth-tabs { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid var(--glass); padding-bottom: 10px; }
        .tab { cursor: pointer; opacity: 0.5; font-weight: 600; transition: 0.3s; }
        .tab.active { opacity: 1; color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* --- UI COMPONENTS --- */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(8, 9, 13, 0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass); }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        
        .balance-card { margin: 20px; padding: 25px; background: linear-gradient(135deg, var(--accent), #4e14a8); border-radius: 25px; position: relative; overflow: hidden; }
        .balance-card::before { content: ''; position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        .bal-title { font-size: 13px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .bal-amount { font-size: 34px; font-weight: 800; margin: 10px 0; }

        /* --- PRODUCT GRID --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .product { background: var(--card); border-radius: 20px; border: 1px solid var(--glass); overflow: hidden; transition: 0.3s; position: relative; }
        .product:active { transform: scale(0.96); }
        .product img { width: 100%; height: 140px; object-fit: cover; }
        .p-body { padding: 12px; }
        .p-name { font-size: 14px; font-weight: 600; height: 40px; overflow: hidden; opacity: 0.9; }
        .p-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .p-price { color: var(--primary); font-weight: 800; font-size: 17px; }
        .buy-btn { width: 35px; height: 35px; border-radius: 12px; background: var(--accent); border: none; color: white; cursor: pointer; }

        /* --- NAVIGATION --- */
        nav { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 70px; background: rgba(18, 20, 28, 0.9); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid var(--glass); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: #555; text-decoration: none; text-align: center; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-link span { font-size: 10px; font-weight: 600; text-transform: uppercase; }

        /* --- PAGES --- */
        .page { position: fixed; inset: 0; background: var(--bg); z-index: 5000; padding: 25px; overflow-y: auto; display: none; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back { font-size: 24px; cursor: pointer; color: var(--primary); }

        /* --- FORMS --- */
        input, select { width: 100%; padding: 16px; background: var(--glass); border: 1px solid var(--glass); border-radius: 15px; color: white; margin-bottom: 15px; outline: none; transition: 0.3s; font-size: 15px; }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        .btn-action { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-accent { background: var(--accent); color: #fff; }

        /* --- ADMIN LIST --- */
        .adm-item { background: var(--glass); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        #toast { position: fixed; top: 30px; left: 20px; right: 20px; background: var(--primary); color: #000; padding: 15px; border-radius: 15px; font-weight: 700; text-align: center; transform: translateY(-150px); transition: 0.5s; z-index: 10001; }
    </style>
</head>
<body>

<div id="toast">Bildiriş Mesajı</div>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="logo" style="font-size: 35px; text-align: center; margin-bottom: 30px;">AXERON</div>
        <div class="auth-tabs">
            <div class="tab active" onclick="auth.toggle(this, 'login')">Giriş</div>
            <div class="tab" onclick="auth.toggle(this, 'register')">Qeydiyyat</div>
        </div>

        <div id="login-form">
            <input type="email" id="l-email" placeholder="E-poçt ünvanı">
            <input type="password" id="l-pass" placeholder="Şifrə">
            <button class="btn-action btn-primary" onclick="auth.handleLogin()">Daxil Ol</button>
        </div>

        <div id="register-form" class="hidden">
            <input type="text" id="r-user" placeholder="İstifadəçi adı">
            <input type="email" id="r-email" placeholder="E-poçt ünvanı">
            <input type="password" id="r-pass" placeholder="Şifrə">
            <button class="btn-action btn-accent" onclick="auth.handleRegister()">Qeydiyyatı Tamamla</button>
        </div>
    </div>
</div>

<header>
    <div class="logo">AXERON</div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <i class="far fa-bell" style="font-size: 20px;"></i>
        <div style="width: 35px; height: 35px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--primary);" onclick="ui.showPage('profile')">
            <i class="fas fa-user" style="font-size: 14px; color: var(--primary);"></i>
        </div>
    </div>
</header>

<main>
    <div class="balance-card">
        <div class="bal-title">Cari Balansınız</div>
        <div class="bal-amount" id="display-bal">0.00 AZN</div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 12px; opacity: 0.8;" id="display-name">İstifadəçi</span>
            <span style="background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 8px; font-size: 11px;" id="display-id">ID: 00000</span>
        </div>
    </div>

    <h3 style="padding: 0 20px 15px; font-weight: 800;">Populyar Məhsullar</h3>
    <div class="grid" id="product-grid"></div>
</main>

<nav>
    <div class="nav-link active" onclick="ui.showPage('home')"><i class="fas fa-th-large"></i><span>Mağaza</span></div>
    <div class="nav-link" onclick="ui.showPage('orders')"><i class="fas fa-shopping-bag"></i><span>Sifariş</span></div>
    <div class="nav-link" onclick="ui.showPage('profile')"><i class="fas fa-user-circle"></i><span>Profil</span></div>
</nav>

<div id="page-profile" class="page">
    <div class="page-header">
        <i class="fas fa-chevron-left back" onclick="ui.closePages()"></i>
        <h2>Profilim</h2>
        <i class="fas fa-cog" onclick="ui.adminGate()"></i>
    </div>
    <div class="auth-card" style="max-width: none; margin-bottom: 20px; text-align: center;">
        <h2 id="p-user">User Name</h2>
        <p id="p-email" style="opacity: 0.5; margin-bottom: 20px;">email@example.com</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div style="background: var(--glass); padding: 15px; border-radius: 15px;">
                <small>Sifarişlər</small><br><b id="p-orders">0</b>
            </div>
            <div style="background: var(--glass); padding: 15px; border-radius: 15px;">
                <small>Xal</small><br><b>120 XP</b>
            </div>
        </div>
    </div>
    <button class="btn-action" style="background: #ff3b3b; color: white;" onclick="auth.logout()">Hesabdan Çıx</button>
</div>

<div id="page-admin" class="page">
    <div class="page-header">
        <i class="fas fa-chevron-left back" onclick="ui.showPage('profile')"></i>
        <h2>Admin Panel</h2>
    </div>
    <div style="background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--glass); margin-bottom: 20px;">
        <h4>Məhsul Əlavə Et</h4>
        <input type="text" id="adm-title" placeholder="Məhsulun adı">
        <input type="number" id="adm-price" placeholder="Qiyməti (AZN)">
        <input type="text" id="adm-img" placeholder="Şəkil URL-i">
        <button class="btn-action btn-primary" onclick="admin.addProduct()">Sistemə Daxil Et</button>
    </div>
    <div style="background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--glass);">
        <h4>İstifadəçi Balansı</h4>
        <input type="text" id="adm-uid" placeholder="İstifadəçi ID-si">
        <input type="number" id="adm-amt" placeholder="Məbləğ">
        <button class="btn-action btn-accent" onclick="admin.giveBalance()">Balansı Artır</button>
    </div>
    <h4 style="margin: 25px 0 10px;">Məhsul siyahısı</h4>
    <div id="adm-list"></div>
</div>

<script>
// --- DATABASE ---
const db = {
    users: JSON.parse(localStorage.getItem('ax_users')) || [],
    currentUser: JSON.parse(localStorage.getItem('ax_session')) || null,
    products: JSON.parse(localStorage.getItem('ax_products')) || [
        {id: 1, t: "Netflix Premium 4K", p: 5.50, img: "https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png"},
        {id: 2, t: "Youtube Premium (1 il)", p: 15.00, img: "https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg"}
    ],
    orders: JSON.parse(localStorage.getItem('ax_orders')) || []
};

// --- AUTH LOGIC ---
const auth = {
    toggle(el, type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('login-form').classList.toggle('hidden', type === 'register');
        document.getElementById('register-form').classList.toggle('hidden', type === 'login');
    },
    handleRegister() {
        const u = document.getElementById('r-user').value;
        const e = document.getElementById('r-email').value;
        const p = document.getElementById('r-pass').value;

        if(!u || !e || !p) return ui.toast("Bütün xanaları doldurun!");
        if(db.users.find(x => x.email === e)) return ui.toast("Bu e-poçt artıq qeydiyyatdadır!");

        const newUser = { id: Math.floor(10000 + Math.random()*90000), user: u, email: e, pass: p, bal: 0, orderCount: 0 };
        db.users.push(newUser);
        localStorage.setItem('ax_users', JSON.stringify(db.users));
        ui.toast("Qeydiyyat uğurlu! Giriş edin.");
        this.toggle(document.querySelectorAll('.tab')[0], 'login');
    },
    handleLogin() {
        const e = document.getElementById('l-email').value;
        const p = document.getElementById('l-pass').value;
        const user = db.users.find(x => x.email === e && x.pass === p);

        if(!user) return ui.toast("E-poçt və ya şifrə yanlışdır!");
        
        db.currentUser = user;
        localStorage.setItem('ax_session', JSON.stringify(user));
        location.reload();
    },
    logout() {
        localStorage.removeItem('ax_session');
        location.reload();
    }
};

// --- UI LOGIC ---
const ui = {
    init() {
        if(db.currentUser) {
            document.getElementById('auth-overlay').classList.add('hidden');
            this.updateStats();
            this.renderProducts();
        }
    },
    updateStats() {
        document.getElementById('display-bal').innerText = db.currentUser.bal.toFixed(2) + " AZN";
        document.getElementById('display-name').innerText = db.currentUser.user;
        document.getElementById('display-id').innerText = "ID: " + db.currentUser.id;
        document.getElementById('p-user').innerText = db.currentUser.user;
        document.getElementById('p-email').innerText = db.currentUser.email;
        document.getElementById('p-orders').innerText = db.currentUser.orderCount;
    },
    renderProducts() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = db.products.map(p => `
            <div class="product">
                <img src="${p.img}">
                <div class="p-body">
                    <div class="p-name">${p.t}</div>
                    <div class="p-footer">
                        <div class="p-price">${p.p.toFixed(2)}</div>
                        <button class="buy-btn" onclick="ui.buy(${p.id})"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        `).join('');
    },
    showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(id === 'home') return;
        document.getElementById('page-' + id).style.display = 'block';
    },
    closePages() { this.showPage('home'); },
    toast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.transform = "translateY(0)";
        setTimeout(() => t.style.transform = "translateY(-150px)", 3000);
    },
    buy(id) {
        const p = db.products.find(x => x.id === id);
        if(db.currentUser.bal < p.p) return this.toast("Balans yetərsizdir!");
        
        if(confirm(p.t + " almaq istəyirsiniz?")) {
            db.currentUser.bal -= p.p;
            db.currentUser.orderCount++;
            this.saveAll();
            this.updateStats();
            this.toast("Sifariş tamamlandı!");
        }
    },
    adminGate() {
        const p = prompt("Admin Şifrəsi:");
        if(p === "Rahim058") {
            this.showPage('admin');
            admin.renderList();
        }
    },
    saveAll() {
        localStorage.setItem('ax_session', JSON.stringify(db.currentUser));
        // Update user in the main list too
        const idx = db.users.findIndex(u => u.id === db.currentUser.id);
        db.users[idx] = db.currentUser;
        localStorage.setItem('ax_users', JSON.stringify(db.users));
        localStorage.setItem('ax_products', JSON.stringify(db.products));
    }
};

// --- ADMIN LOGIC ---
const admin = {
    addProduct() {
        const t = document.getElementById('adm-title').value;
        const p = parseFloat(document.getElementById('adm-price').value);
        const img = document.getElementById('adm-img').value;
        if(!t || !p) return;
        db.products.push({id: Date.now(), t, p, img});
        ui.saveAll();
        ui.renderProducts();
        this.renderList();
        ui.toast("Məhsul əlavə edildi!");
    },
    giveBalance() {
        const id = parseInt(document.getElementById('adm-uid').value);
        const amt = parseFloat(document.getElementById('adm-amt').value);
        if(id === db.currentUser.id) {
            db.currentUser.bal += amt;
            ui.saveAll();
            ui.updateStats();
            ui.toast("Balansınız artırıldı!");
        } else {
            const user = db.users.find(u => u.id === id);
            if(user) {
                user.bal += amt;
                localStorage.setItem('ax_users', JSON.stringify(db.users));
                ui.toast(user.user + " balansına " + amt + " AZN əlavə edildi.");
            }
        }
    },
    renderList() {
        const l = document.getElementById('adm-list');
        l.innerHTML = db.products.map(p => `
            <div class="adm-item">
                <span>${p.t}</span>
                <i class="fas fa-trash" style="color: red;" onclick="admin.del(${p.id})"></i>
            </div>
        `).join('');
    },
    del(id) {
        db.products = db.products.filter(x => x.id !== id);
        ui.saveAll();
        ui.renderProducts();
        this.renderList();
    }
};

ui.init();
</script>
</body>
</html>
