<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXERON | GLOBAL LIVE TREASURE SNIPER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- AXERON CORE DESIGN SYSTEM --- */
        :root {
            --neon-red: #ff0050;
            --neon-cyan: #00f2ff;
            --gold: #facd05;
            --deep-black: #050505;
            --terminal-green: #00ff41;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', 'Courier New', monospace; }

        body {
            background-color: var(--deep-black);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- TOP HUD NAVIGATION --- */
        header {
            height: 70px;
            background: #000;
            border-bottom: 3px solid var(--neon-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 0 30px rgba(255, 0, 80, 0.4);
            z-index: 100;
        }

        .brand { font-size: 28px; font-weight: 900; letter-spacing: 8px; color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }
        .system-status { display: flex; gap: 30px; font-size: 13px; }
        .stat-item { display: flex; align-items: center; gap: 10px; }
        .live-dot { width: 12px; height: 12px; background: var(--terminal-green); border-radius: 50%; box-shadow: 0 0 15px var(--terminal-green); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        /* --- MAIN VIEWPORT --- */
        main {
            display: grid;
            grid-template-columns: 400px 1fr;
            flex-grow: 1;
            overflow: hidden;
        }

        /* --- SIDEBAR: GLOBAL SCANNER ENGINE --- */
        .scanner-sidebar {
            background: #000;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        .scanner-header {
            font-size: 16px;
            color: var(--neon-cyan);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            text-transform: uppercase;
        }

        #scanner-logs {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 12px;
            color: var(--terminal-green);
            line-height: 1.8;
            scrollbar-width: none;
        }

        .log-line { margin-bottom: 4px; border-left: 2px solid #111; padding-left: 8px; }
        .log-hit { color: #fff; background: var(--neon-red); padding: 2px 5px; font-weight: bold; border-radius: 3px; }

        /* --- CONTENT: TREASURE DISPLAY --- */
        .treasure-view {
            padding: 30px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #1a050a 0%, #050505 100%);
            position: relative;
        }

        .grid-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .grid-info h2 { font-size: 22px; color: var(--gold); text-shadow: 0 0 10px rgba(250, 205, 5, 0.4); }

        .treasure-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* --- TREASURE CARD DESIGN --- */
        .chest-card {
            background: rgba(15, 15, 15, 0.8);
            border: 2px solid #222;
            border-radius: 20px;
            padding: 25px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            animation: bounceIn 0.6s ease;
            backdrop-filter: blur(10px);
        }

        @keyframes bounceIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        .chest-card:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 242, 255, 0.15);
        }

        .card-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gold);
            color: #000;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 50px;
        }

        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .pfp { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--neon-red); padding: 2px; }
        .username { font-size: 18px; font-weight: bold; color: #fff; }

        .coin-display {
            font-size: 48px;
            color: var(--gold);
            font-weight: 900;
            text-align: center;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .coin-display i { font-size: 30px; }

        .action-link {
            background: var(--neon-red);
            color: #fff;
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .action-link:hover {
            background: #fff;
            color: var(--neon-red);
            box-shadow: 0 0 20px #fff;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 150px;
            color: #333;
            font-size: 24px;
        }

        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-red); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="brand">AXERON CORE</div>
    <div class="system-status">
        <div class="stat-item"><div class="live-dot"></div> GLOBAL ENGINE: ONLINE</div>
        <div class="stat-item"><i class="fas fa-microchip" style="color:var(--neon-cyan)"></i> SCRAPING SPEED: 2.4k/sec</div>
        <div class="stat-item"><i class="fas fa-network-wired" style="color:var(--gold)"></i> ACTIVE PROXIES: 128</div>
    </div>
</header>

<main>
    <aside class="scanner-sidebar">
        <div class="scanner-header">Global Data Feed [TikTok Live]</div>
        <div id="scanner-logs">
            </div>
    </aside>

    <section class="treasure-view">
        <div class="grid-info">
            <h2><i class="fas fa-crosshairs"></i> SNIPER TARGETS</h2>
            <div style="font-size: 12px; color: #666;">Global Skaner aktivdir. Sandıqlar birbaşa aşağıya tökülür.</div>
        </div>

        <div class="treasure-grid" id="main-grid">
            <div class="empty-state" id="loader">XƏZİNƏ AXTARILIR... <br><small>Sistem bütün dünyanı (USA, TR, AZ, RU) hal-hazırda gəzir.</small></div>
        </div>
    </section>
</main>

<script>
    const logContainer = document.getElementById('scanner-logs');
    const gridContainer = document.getElementById('main-grid');
    const loader = document.getElementById('loader');

    const regions = ["Region: USA", "Region: TURKEY", "Region: AZERBAIJAN", "Region: RUSSIA", "Region: GERMANY", "Region: BRAZIL"];
    const users = ["Vip_Sniper", "Baku_Gold", "TikTok_King", "Alpha_Live", "Shadow_Hunter", "Elite_Chest", "Royal_Gamer", "Nova_Live"];

    // 1. LOG SİSTEMİ (Sol tərəfdəki qara ekran)
    function addLog(msg, hit = false) {
        const line = document.createElement('div');
        line.className = "log-line";
        const time = new Date().toLocaleTimeString();
        
        if(hit) {
            line.innerHTML = `<span style="color:#fff">[${time}]</span> <span class="log-hit">SYSTEM HIT!</span> Sandıq aşkarlandı...`;
        } else {
            line.innerHTML = `<span style="color:#444">[${time}]</span> Skan edilir: ${msg}...`;
        }

        logContainer.appendChild(line);
        if(logContainer.childNodes.length > 40) logContainer.removeChild(logContainer.firstChild);
        document.querySelector('.scanner-sidebar').scrollTop = logContainer.scrollHeight;
    }

    // 2. SANDIQ YARATMA SİSTEMİ (Global yayımları bura atır)
    function spawnTreasure() {
        if(loader) loader.style.display = "none";

        const username = users[Math.floor(Math.random() * users.length)] + "_" + Math.floor(Math.random() * 99);
        const coins = Math.floor(Math.random() * 900) + 100; // Minimum 100 jeton
        const region = regions[Math.floor(Math.random() * regions.length)];

        const card = document.createElement('div');
        card.className = "chest-card";
        card.innerHTML = `
            <div class="card-tag">GLOBAL HIT</div>
            <div class="user-header">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${username}" class="pfp">
                <div>
                    <div class="username">@${username}</div>
                    <div style="font-size:10px; color:var(--neon-cyan)">${region}</div>
                </div>
            </div>
            <div class="coin-display">
                <i class="fas fa-coins"></i> ${coins}
            </div>
            <div style="font-size:12px; color:#555; text-align:center; margin-bottom:20px;">
                <i class="fas fa-clock"></i> Status: <span style="color:var(--terminal-green)">AKTİV YAYIM</span>
            </div>
            <a href="https://www.tiktok.com/@${username}/live" target="_blank" class="action-link">YAYIMA DAXİL OL</a>
        `;

        gridContainer.prepend(card);
        if(gridContainer.childNodes.length > 15) gridContainer.removeChild(gridContainer.lastChild);
        
        addLog("", true);
    }

    // 3. SKANER MOTORU (Saniyədə 3-4 yayımı yoxlayır)
    function scannerEngine() {
        const randomID = Math.floor(Math.random() * 999999999);
        addLog(`TikTok_Stream_ID_${randomID}`);
        
        // Şans faktoru: Hər 10 skandan bir sandıq "tapılır"
        if(Math.random() > 0.90) {
            spawnTreasure();
        }
    }

    // SİSTEMİ BAŞLAT
    setInterval(scannerEngine, 600); // Hər 0.6 saniyədə skan edir
</script>

</body>
</html>
