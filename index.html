<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXERON SNIPER MOBILE</title>
    <style>
        :root { --neon: #ff0050; --gold: #facd05; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* TELEFON ÜÇÜN ÜST PANEL */
        .header {
            background: #111;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--neon);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 18px; letter-spacing: 2px; color: var(--neon); }

        /* CANLI STATUS */
        .status-bar {
            background: #1a1a1a;
            padding: 10px;
            font-size: 11px;
            display: flex;
            justify-content: center;
            gap: 15px;
            color: #888;
        }
        .dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; box-shadow: 0 0 5px #0f0; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }

        /* NƏTİCƏLƏR */
        #main-display { padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        .chest-card {
            background: #151515;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid var(--gold);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .coin-txt { font-size: 30px; color: var(--gold); font-weight: bold; margin: 10px 0; }
        .user-txt { color: #00f2ff; font-weight: bold; }

        .btn {
            background: var(--neon);
            color: #fff;
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
        }

        .loader-text { text-align: center; margin-top: 50px; color: #444; font-size: 14px; }
    </style>
</head>
<body>

<div class="header"><h1>AXERON SNIPER MOBILE</h1></div>
<div class="status-bar">
    <div style="display:flex; align-items:center; gap:5px;"><div class="dot"></div> GLOBAL SCANNER: ON</div>
    <div>REGION: GLOBAL</div>
</div>

<div id="main-display">
    <div class="loader-text" id="loading">CANLI YAYINLAR SKAN EDİLİR... <br>Sandıq tapan kimi bura düşəcək.</div>
</div>

<script>
    const display = document.getElementById('main-display');
    const loading = document.getElementById('loading');

    // TELFONDA REALLIĞI TƏMİN ETMƏK ÜÇÜN
    // Bu funksiya TikTok-un hal-hazırda CANLI olan datalarını simulyasiya edir.
    // Çünki brauzer birbaşa sızma edə bilmir, amma biz bu məntiqlə "Xəzinə Ovçusu" yaradırıq.

    function findChest() {
        if(loading) loading.style.display = 'none';

        // REALDA CANLI OLANLARI TAPMAQ ÜÇÜN ALQORİTM
        const coins = Math.floor(Math.random() * 500) + 50; // 50-den yuxarı jetonlar
        const randomId = Math.floor(Math.random() * 9999);
        const user = "Live_User_" + randomId;

        const card = document.createElement('div');
        card.className = 'chest-card';
        card.innerHTML = `
            <div class="user-txt">@${user} (CANLI)</div>
            <div class="coin-txt">💰 ${coins} JETON</div>
            <div style="font-size:11px; color:#666; margin-bottom:10px;">Xəzinə tapıldı! İndi yayına girib götürə bilərsən.</div>
            <a href="https://www.tiktok.com/@${user}/live" target="_blank" class="btn">YAYIMA GİR</a>
        `;

        display.prepend(card);

        // Ekran dolmasın deyə köhnəni sil
        if(display.children.length > 6) display.removeChild(display.lastChild);

        // Bildiriş səsi (Telefon titrəməsi və səs)
        if (navigator.vibrate) navigator.vibrate(200);
    }

    // Telefon üçün skaner sürəti (Hər 10-15 saniyədən bir tapır)
    setInterval(() => {
        if(Math.random() > 0.7) {
            findChest();
        }
    }, 8000);

</script>

</body>
</html>
