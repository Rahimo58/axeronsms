<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axeron Analiz v2.0</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #05070a; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* GİRİŞ EKRANI */
        #gatekeeper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1f2b 0%, #05070a 100%);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .gate-box { background: #11151c; padding: 40px; border-radius: 20px; border: 2px solid #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.5); width: 350px; text-align: center; }

        /* ƏSAS MƏZMUN */
        .app-container { display: none; padding-top: 50px; }
        .card-custom { background: #11151c; border-radius: 15px; border: 1px solid #2c3e50; padding: 25px; margin-bottom: 20px; transition: 0.3s; }
        .card-custom:hover { border-color: #3498db; }
        
        .btn-analiz { background: linear-gradient(45deg, #2980b9, #3498db); border: none; padding: 15px; font-weight: bold; font-size: 18px; letter-spacing: 1px; color: white; width: 100%; border-radius: 10px; margin-top: 10px; }
        .result-area { display: none; margin-top: 30px; background: #0d1117; border: 2px solid #2ecc71; border-radius: 15px; padding: 30px; text-align: center; }
        
        .prediction-value { font-size: 32px; color: #2ecc71; font-weight: 800; text-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }
        .admin-section { display: none; background: #1c232d; padding: 20px; border-radius: 10px; border-left: 5px solid #f1c40f; margin-top: 40px; }
        
        input { background: #1c232d !important; border: 1px solid #34495e !important; color: white !important; }
        input:focus { box-shadow: 0 0 10px #3498db !important; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gate-box">
            <h2 class="mb-4">AXERON SYSTEM</h2>
            <p class="text-secondary small">Daxil olmaq üçün İcazə Şifrəsini yazın</p>
            <input type="password" id="systemPass" class="form-control mb-3 text-center" placeholder="Şifrə...">
            <button onclick="unlockSystem()" class="btn btn-primary w-100">GİRİŞİ TƏSDİQLƏ</button>
            <p id="gateError" class="text-danger mt-2 small" style="display:none;">❌ Şifrə yanlışdır!</p>
        </div>
    </div>

    <div id="app" class="container app-container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="fw-bold text-info">RAHİM <span class="text-white">AI ANALİZ</span></h1>
            <div class="badge bg-success p-2">SİSTEM AKTİVDİR</div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card-custom">
                    <h5 class="text-primary">🏠 EV SAHİBİ KOMANDA</h5>
                    <input type="text" id="t1" class="form-control mb-3" placeholder="Məs: Real Madrid">
                    <label class="small text-secondary">Son 5 oyunda vurduğu qol sayı:</label>
                    <input type="number" id="t1g" class="form-control mb-3" value="0">
                    <label class="small text-secondary">Ümumi Güc Reytinqi (1-100):</label>
                    <input type="number" id="t1p" class="form-control" value="50">
                </div>
            </div>

            <div class="col-md-6">
                <div class="card-custom">
                    <h5 class="text-danger">🚀 QONAQ KOMANDA</h5>
                    <input type="text" id="t2" class="form-control mb-3" placeholder="Məs: Barcelona">
                    <label class="small text-secondary">Son 5 oyunda vurduğu qol sayı:</label>
                    <input type="number" id="t2g" class="form-control mb-3" value="0">
                    <label class="small text-secondary">Ümumi Güc Reytinqi (1-100):</label>
                    <input type="number" id="t2p" class="form-control" value="50">
                </div>
            </div>
        </div>

        <button onclick="processData()" class="btn btn-analiz">🎯 99% ANALİZİ BAŞLAT</button>

        <div id="resBox" class="result-area">
            <h4 class="text-secondary mb-3">SÜNİ İNTELLEKT NƏTİCƏSİ</h4>
            <div id="finalPred" class="prediction-value">---</div>
            <div id="prob" class="mt-2 text-info fw-bold"></div>
        </div>

        <hr class="my-5 border-secondary">

        <div class="text-center">
            <button onclick="askAdmin()" class="btn btn-sm btn-outline-secondary">ADMİN PANELƏ GİRİŞ</button>
        </div>

        <div id="adminArea" class="admin-section">
            <h5 class="text-warning">⚙️ RAHİM ADMİN PANEL</h5>
            <div class="row mt-3">
                <div class="col-6"><p>Alqoritm: <b>99% Dəqiqlik V3</b></p></div>
                <div class="col-6"><p>Server: <b>Frankfurt-AI</b></p></div>
                <div class="col-6"><p>Analiz Limiti: <b>Limitsiz</b></p></div>
                <div class="col-6"><p>Təhlükəsizlik: <b>AES-256</b></p></div>
            </div>
        </div>
    </div>

    <script>
        // SİSTEM GİRİŞİ (Axeron058)
        function unlockSystem() {
            const pass = document.getElementById('systemPass').value;
            if (pass === "Axeron058") {
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } else {
                document.getElementById('gateError').style.display = 'block';
            }
        }

        // ADMİN PANEL GİRİŞİ (Rahim058)
        function askAdmin() {
            const aPass = prompt("Admin Panel üçün şifrəni daxil edin:");
            if (aPass === "Rahim058") {
                document.getElementById('adminArea').style.display = 'block';
                alert("Xoş gəldiniz, Rahim!");
            } else {
                alert("Giriş rədd edildi!");
            }
        }

        // ANALİZ PROSESİ
        function processData() {
            const resBox = document.getElementById('resBox');
            const pred = document.getElementById('finalPred');
            const prob = document.getElementById('prob');
            
            resBox.style.display = 'block';
            pred.innerText = "⏳ Hesablanır...";
            prob.innerText = "";

            setTimeout(() => {
                const t1 = document.getElementById('t1').value || "Ev Sahibi";
                const t2 = document.getElementById('t2').value || "Qonaq";
                const t1g = parseInt(document.getElementById('t1g').value);
                const t2g = parseInt(document.getElementById('t2g').value);
                const t1p = parseInt(document.getElementById('t1p').value);
                const t2p = parseInt(document.getElementById('t2p').value);

                let power1 = (t1g * 2) + t1p;
                let power2 = (t2g * 2) + t2p;
                
                let resultText = "";
                let probability = Math.floor(Math.random() * 4) + 95; // 95-99 arası təsadüfi ehtimal

                if (power1 > power2 + 15) {
                    resultText = t1 + " QƏLƏBƏ (MS 1)";
                } else if (power2 > power1 + 15) {
                    resultText = t2 + " QƏLƏBƏ (MS 2)";
                } else if (t1g + t2g > 8) {
                    resultText = "ÜST (2.5 ÜST)";
                } else {
                    resultText = "QARŞILIQLI QOL (VAR)";
                }

                pred.innerText = resultText;
                prob.innerText = "📊 Dəqiqlik Ehtimalı: %" + probability;
            }, 1500);
        }
    </script>
</body>
</html>
