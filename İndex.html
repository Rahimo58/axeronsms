<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axeron SMS | Satış Paneli</title>
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .nav { background: #151921; padding: 20px; font-size: 24px; font-weight: bold; color: #00d2ff; border-bottom: 1px solid #2d343f; }
        .container { padding: 30px; }
        .card { background: #151921; border-radius: 15px; padding: 20px; border: 1px solid #2d343f; display: inline-block; width: 280px; margin: 10px; }
        .price { font-size: 22px; color: #00d2ff; font-weight: bold; margin: 15px 0; }
        .btn { background: #00d2ff; color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* Form */
        #order-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c222d; padding: 25px; border-radius: 15px; border: 2px solid #00d2ff; box-shadow: 0 0 20px rgba(0,210,255,0.3); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #0a0c10; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="nav">AXERON SMS</div>

<div class="container">
    <div class="card">
        <img src="https://flagcdn.com/w80/az.png" width="50">
        <h3>Azərbaycan (+994)</h3>
        <div class="price">5.00 AZN</div>
        <button class="btn" onclick="showForm('+994 Azərbaycan')">İNDİ AL</button>
    </div>

    <div class="card">
        <img src="https://flagcdn.com/w80/tr.png" width="50">
        <h3>Türkiyə (+90)</h3>
        <div class="price">4.00 AZN</div>
        <button class="btn" onclick="showForm('+90 Türkiyə')">İNDİ AL</button>
    </div>
</div>

<div id="order-box">
    <h3 id="selected-title" style="color:#00d2ff"></h3>
    <input type="text" id="cust-phone" placeholder="Əlaqə nömrəniz">
    <p style="font-size: 11px; color: #888;">Ödəniş M10/Card ilə qəbul edilir.</p>
    <button class="btn" onclick="sendOrder()" style="background:#28a745; color:white;">SİFARİŞİ GÖNDƏR</button>
    <button class="btn" onclick="hideForm()" style="background:#dc3545; margin-top:5px; color:white;">İMTİNA</button>
</div>

<script>
    let currentSelection = "";

    function showForm(name) {
        currentSelection = name;
        document.getElementById('selected-title').innerText = name;
        document.getElementById('order-box').style.display = 'block';
    }

    function hideForm() {
        document.getElementById('order-box').style.display = 'none';
    }

    function sendOrder() {
        const userPhone = document.getElementById('cust-phone').value;
        const token = "8726373680:AAF2werxJGL5txqaVsKagScoE_4d8sQSwW8";
        const chat_id = "8528240785";

        if(!userPhone) { alert("Nömrəni yaz!"); return; }

        const text = `🛒 YENİ SİFARİŞ!\n🌍 Ölkə: ${currentSelection}\n👤 Müştəri: ${userPhone}`;
        
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`)
        .then(() => {
            alert("Sifariş bota göndərildi! Səninlə əlaqə saxlanılacaq.");
            hideForm();
        });
    }
</script>

</body>
</html>
